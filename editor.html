<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Håndslag — Editor de Mapa</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#06061a;--surface:#0e0c24;--surface2:#14122e;
  --accent:#b44fff;--cyan:#06c8e8;--border:rgba(255,255,255,0.1);
  --text:#f0f0f0;--muted:#888;
  --font:'Barlow Condensed',sans-serif;--mono:'Space Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;}
#lock{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.lock-logo{font-size:28px;font-weight:700;background:linear-gradient(135deg,#b44fff,#06c8e8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
#app{display:none;height:100vh;flex-direction:column;}
#hdr{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);height:52px;flex-shrink:0;}
.logo{font-size:18px;font-weight:700;background:linear-gradient(135deg,#b44fff,#06c8e8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.spacer{flex:1;}
.hbtn{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:10px;cursor:pointer;padding:7px 14px;border-radius:8px;}
.hbtn.accent{background:linear-gradient(135deg,#b44fff,#06c8e8);color:#000;border:none;font-weight:700;}
#sync-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);}
#sync-dot.off{background:var(--muted);}
#body{display:flex;flex:1;overflow:hidden;}
/* Sidebar */
#sidebar{width:260px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
#sb-top{padding:12px;border-bottom:1px solid var(--border);}
.sb-title{font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.add-btn{width:100%;padding:10px;background:linear-gradient(135deg,#b44fff,#06c8e8);border:none;border-radius:10px;color:#000;font-family:var(--mono);font-size:11px;font-weight:700;cursor:pointer;}
#table-list{flex:1;overflow-y:auto;padding:8px;}
.tbl-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;border:1px solid transparent;margin-bottom:4px;}
.tbl-row:hover{background:var(--surface2);}
.tbl-row.selected{background:rgba(180,79,255,0.15);border-color:var(--accent);}
.tbl-icon{width:28px;height:28px;border-radius:50%;background:var(--surface2);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.tbl-icon.sq{border-radius:5px;}
.tbl-meta{flex:1;min-width:0;}
.tbl-nm{font-size:15px;font-weight:700;line-height:1;}
.tbl-sb{font-family:var(--mono);font-size:10px;color:var(--muted);}
.del-btn{background:none;border:none;color:rgba(224,82,82,0.5);font-size:14px;cursor:pointer;flex-shrink:0;padding:2px 6px;}
.del-btn:hover{color:#e05252;}
/* Properties panel */
#props{padding:12px;border-top:1px solid var(--border);flex-shrink:0;}
.prop-title{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.prop-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.prop-lbl{font-family:var(--mono);font-size:10px;color:var(--muted);width:36px;flex-shrink:0;}
.prop-inp{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:13px;padding:6px 8px;outline:none;}
.prop-inp:focus{border-color:var(--accent);}
.type-row{display:flex;gap:6px;margin-bottom:8px;}
.type-btn{flex:1;padding:7px;border:1px solid var(--border);border-radius:7px;background:var(--surface2);color:var(--muted);font-family:var(--mono);font-size:10px;cursor:pointer;text-align:center;}
.type-btn.active{background:rgba(6,200,232,0.15);border-color:var(--cyan);color:var(--cyan);}
/* Canvas */
#canvas-wrap{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#d4cdc0;padding:12px;}
#fp-box{background:#fff;border-radius:6px;box-shadow:0 6px 32px rgba(0,0,0,0.3);overflow:hidden;position:relative;}
#fp{display:block;font-family:'Space Mono',monospace;cursor:crosshair;}
.tbl-g{cursor:grab;}
.tbl-g.dragging{cursor:grabbing;}
.tbl-g.selected .tbl-shape{filter:drop-shadow(0 0 8px rgba(180,79,255,0.9));stroke:#b44fff !important;stroke-width:5 !important;}
/* Toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--accent);color:#000;font-family:var(--mono);font-size:11px;font-weight:700;padding:10px 20px;border-radius:20px;transition:transform 0.3s;z-index:600;pointer-events:none;}
#toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="lock">
  <div style="font-size:40px">🗂</div>
  <div class="lock-logo">HÅNDSLAG — EDITOR</div>
  <div style="font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center;line-height:1.8" id="lock-msg">Verificando acceso...</div>
  <button style="display:none;font-family:var(--mono);font-size:11px;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:8px;cursor:pointer" id="lock-back" onclick="goBack()">← Volver</button>
</div>
<div id="app">
  <div id="hdr">
    <button class="hbtn" onclick="goBack()">← Volver</button>
    <span class="logo">Editor de Mapa</span>
    <div class="spacer"></div>
    <button class="hbtn" onclick="resetDefault()">Restaurar mesas</button>
    <div id="sync-dot"></div>
  </div>
  <div id="body">
    <div id="sidebar">
      <div id="sb-top">
        <div class="sb-title">Mesas (total: <span id="tbl-count">0</span>)</div>
        <button class="add-btn" onclick="addTable('circle')">+ Mesa redonda</button>
        <button class="add-btn" style="margin-top:6px;background:var(--surface2);border:1px solid var(--border);color:var(--text);" onclick="addTable('rect')">+ Mesa cuadrada</button>
      </div>
      <div id="table-list"></div>
      <div id="props" style="display:none;">
        <div class="prop-title">Propiedades</div>
        <div class="prop-row">
          <span class="prop-lbl">Nombre</span>
          <input class="prop-inp" id="p-name" type="text" placeholder="Ej: 5"/>
        </div>
        <div class="prop-row">
          <span class="prop-lbl">Zona</span>
          <input class="prop-inp" id="p-sub" type="text" placeholder="VIP, Kaffe..."/>
        </div>
        <div class="prop-row">
          <span class="prop-lbl">Tipo</span>
          <div class="type-row" style="flex:1">
            <button class="type-btn" id="tb-circle" onclick="setType('circle')">◯ Redonda</button>
            <button class="type-btn" id="tb-rect" onclick="setType('rect')">□ Cuadrada</button>
          </div>
        </div>
        <div class="prop-row" id="row-r" style="display:none">
          <span class="prop-lbl">Radio</span>
          <input class="prop-inp" id="p-r" type="number" style="width:70px"/>
        </div>
        <div class="prop-row" id="row-wh" style="display:none">
          <span class="prop-lbl">W × H</span>
          <input class="prop-inp" id="p-w" type="number" style="width:60px"/>
          <span style="color:var(--muted);font-size:12px">×</span>
          <input class="prop-inp" id="p-h" type="number" style="width:60px"/>
        </div>
      </div>
    </div>
    <div id="canvas-wrap">
      <div id="fp-box">
        <svg id="fp" viewBox="0 0 1440 1040">
          <!-- ── ROOM ── -->
          <rect x="90" y="150" width="1260" height="800" fill="#faf7f1"/>
          <!-- ── ZONES ── -->
          <rect x="1010" y="155" width="335" height="790" fill="#e8ede6"/>
          <rect x="110" y="792" width="430" height="146" rx="6" fill="#f3e7d8"/>
          <line x1="1010" y1="240" x2="1010" y2="950" stroke="#b8b1a2" stroke-width="3"/>
          <!-- ── WALLS (no entrance cuts) ── -->
          <g stroke="#33312c" stroke-width="7" stroke-linecap="round" fill="none">
            <line x1="90" y1="150" x2="1350" y2="150"/>
            <line x1="90" y1="150" x2="90" y2="950"/>
            <line x1="1350" y1="150" x2="1350" y2="950"/>
            <line x1="90" y1="950" x2="1350" y2="950"/>
          </g>
          <!-- ── TOP KAFFE SHELF ── -->
          <rect x="560" y="167" width="760" height="46" rx="5" fill="#33312c"/>
          <text x="935" y="132" text-anchor="middle" font-size="26" letter-spacing="6" fill="#6f695d">KAFFE</text>
          <!-- ── MAIN BAR ── -->
          <rect x="582" y="320" width="112" height="440" rx="6" fill="#33312c"/>
          <text transform="rotate(-90 638 540)" x="638" y="540" text-anchor="middle" dominant-baseline="middle" font-size="25" letter-spacing="5" fill="#f3efe6">MAIN BAR</text>
          <!-- ── BACK BAR ── -->
          <rect x="772" y="558" width="138" height="202" rx="6" fill="#33312c"/>
          <text transform="rotate(-90 841 659)" x="841" y="659" text-anchor="middle" dominant-baseline="middle" font-size="21" letter-spacing="4" fill="#f3efe6">BACK BAR</text>
          <!-- ── DANCEFLOOR ── -->
          <text x="325" y="826" text-anchor="middle" font-size="22" letter-spacing="5" fill="#b08a55">DANCEFLOOR</text>
          <!-- ── GRID ── -->
          <g opacity="0.1">
            <defs><pattern id="grid40" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse"><circle cx="20" cy="20" r="1.5" fill="#33312c"/></pattern></defs>
            <rect x="90" y="150" width="1260" height="800" fill="url(#grid40)"/>
          </g>
          <!-- ── TABLES ── -->
          <g id="tables-layer"></g>
        </svg>
      </div>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
const FB_CFG={apiKey:"AIzaSyC4c-4MXb9lrVMiHWn_0tE6PKIOU_lScRs",authDomain:"handslag-fdd42.firebaseapp.com",databaseURL:"https://handslag-fdd42-default-rtdb.europe-west1.firebasedatabase.app",projectId:"handslag-fdd42",storageBucket:"handslag-fdd42.appspot.com",messagingSenderId:"1090291987706",appId:"1:1090291987706:web:0effe68dc7e7faa1ef06cd"};
firebase.initializeApp(FB_CFG);
const db=firebase.database();

const DEFAULT_TABLES=[
  {id:3,name:'3',sub:'',type:'rect',x:602,y:248,w:72,h:72},
  {id:2,name:'2',sub:'',type:'rect',x:704,y:248,w:72,h:72},
  {id:1,name:'1',sub:'',type:'rect',x:805,y:248,w:72,h:72},
  {id:4,name:'4',sub:'',type:'rect',x:154,y:324,w:72,h:72},
  {id:5,name:'5',sub:'',type:'rect',x:154,y:419,w:72,h:72},
  {id:6,name:'6',sub:'',type:'rect',x:154,y:514,w:72,h:72},
  {id:7,name:'7',sub:'',type:'rect',x:154,y:619,w:72,h:72},
  {id:8,name:'8',sub:'',type:'rect',x:154,y:709,w:72,h:72},
  {id:9,name:'9',sub:'Dancefloor',type:'rect',x:164,y:843,w:72,h:72},
  {id:10,name:'10',sub:'',type:'rect',x:396,y:843,w:72,h:72},
  {id:11,name:'11',sub:'',type:'circle',cx:630,cy:878,r:37},
  {id:12,name:'12',sub:'',type:'circle',cx:742,cy:878,r:37},
  {id:13,name:'13',sub:'',type:'circle',cx:854,cy:878,r:37},
  {id:14,name:'14',sub:'',type:'circle',cx:966,cy:878,r:37},
  {id:15,name:'15',sub:'',type:'circle',cx:1078,cy:878,r:37},
  {id:16,name:'16',sub:'',type:'circle',cx:1230,cy:360,r:37},
  {id:17,name:'17',sub:'',type:'circle',cx:1230,cy:502,r:37},
  {id:18,name:'18',sub:'',type:'circle',cx:1230,cy:636,r:37},
  {id:19,name:'19',sub:'',type:'circle',cx:1295,cy:770,r:37},
];

let tables=[],selected=null,nextId=200;
let drag={active:false,t:null,startPt:null,origPos:null};

function checkAuth(){
  var user=null;
  try{user=JSON.parse(sessionStorage.getItem('hs_currentUser'));}catch(e){}
  if(!user){try{user=JSON.parse(localStorage.getItem('hs_currentUser'));}catch(e){}}
  if(!user){
    var uname=sessionStorage.getItem('hs_loggedUsername')||localStorage.getItem('hs_loggedUsername');
    if(uname){db.ref('users').once('value',function(s){var all=s.val()||{};var f=Object.values(all).find(function(u){return u.username===uname;});if(f&&f.role==='admin')grantAccess(f);else denyAccess();});return;}
    denyAccess();return;
  }
  if(user.role!=='admin'){denyAccess();return;}
  grantAccess(user);
}
function grantAccess(user){
  document.getElementById('lock').style.display='none';
  document.getElementById('app').style.display='flex';
  fitSVG();
  window.addEventListener('resize',fitSVG);
  db.ref('.info/connected').on('value',function(s){document.getElementById('sync-dot').className=s.val()?'':'off';});
  db.ref('mapa_v2/main/tables').on('value',function(snap){
    var raw=snap.val();
    if(raw){
      var arr=Array.isArray(raw)?raw:Object.values(raw);
      tables=arr.filter(Boolean);
      nextId=Math.max(nextId,...tables.map(function(t){return t.id||0;}))+1;
    } else {
      tables=DEFAULT_TABLES.map(function(t){return Object.assign({},t);});
      saveTables();
    }
    render();
    renderList();
  });
}
function denyAccess(){
  document.getElementById('lock-msg').innerHTML='Solo administradores.<br>Inicia sesión con una cuenta admin.';
  document.getElementById('lock-back').style.display='block';
}
function goBack(){window.location.href='index.html';}
function saveTables(){db.ref('mapa_v2/main/tables').set(tables.map(function(t){return Object.assign({},t);}));}
function resetDefault(){if(!confirm('Esto restaura las mesas originales del plano. ¿Continuar?'))return;tables=DEFAULT_TABLES.map(function(t){return Object.assign({},t);});selected=null;saveTables();}

function fitSVG(){
  var wrap=document.getElementById('canvas-wrap');
  var maxW=wrap.clientWidth-24,maxH=wrap.clientHeight-24;
  var scale=Math.min(maxW/1440,maxH/1040);
  var w=Math.round(1440*scale),h=Math.round(1040*scale);
  var svg=document.getElementById('fp');
  svg.style.width=w+'px';svg.style.height=h+'px';
  document.getElementById('fp-box').style.width=w+'px';
}

var NS='http://www.w3.org/2000/svg';
function svgEl(tag,attrs){var el=document.createElementNS(NS,tag);Object.keys(attrs).forEach(function(k){el.setAttribute(k,attrs[k]);});return el;}

function render(){
  var layer=document.getElementById('tables-layer');
  while(layer.firstChild)layer.removeChild(layer.firstChild);
  tables.forEach(function(t){
    var g=document.createElementNS(NS,'g');
    g.setAttribute('class','tbl-g'+(selected===t?' selected':''));
    g.setAttribute('data-id',t.id);

    var shape,tx,ty;
    if(t.type==='circle'){
      var r=t.r||37;
      shape=svgEl('circle',{cx:t.cx,cy:t.cy,r:r,fill:'#fff',stroke:'#33312c','stroke-width':'3',class:'tbl-shape'});
      tx=t.cx;ty=t.cy+10;
    } else {
      var w=t.w||72,h=t.h||72;
      shape=svgEl('rect',{x:t.x,y:t.y,width:w,height:h,rx:'7',fill:'#fff',stroke:'#33312c','stroke-width':'3',class:'tbl-shape'});
      tx=t.x+w/2;ty=t.y+h/2+10;
    }
    g.appendChild(shape);

    var txt=svgEl('text',{x:tx,y:ty,'text-anchor':'middle','font-size':t.name.length>2?'24':'32','font-weight':'700',fill:'#33312c','pointer-events':'none'});
    txt.textContent=t.name;
    g.appendChild(txt);

    if(t.sub){
      var sub=svgEl('text',{x:tx,y:ty+22,'text-anchor':'middle','font-size':'16',fill:'#888','pointer-events':'none'});
      sub.textContent=t.sub;
      g.appendChild(sub);
    }

    // Drag handlers
    g.addEventListener('mousedown',function(e){startDrag(e,t);});
    g.addEventListener('touchstart',function(e){startDrag(e,t);},{passive:false});
    g.addEventListener('click',function(e){e.stopPropagation();selectTable(t);});
    layer.appendChild(g);
  });
  document.getElementById('tbl-count').textContent=tables.length;
}

function renderList(){
  var list=document.getElementById('table-list');
  while(list.firstChild)list.removeChild(list.firstChild);
  tables.forEach(function(t){
    var row=document.createElement('div');
    row.className='tbl-row'+(selected===t?' selected':'');
    var icon=document.createElement('div');
    icon.className='tbl-icon'+(t.type==='rect'?' sq':'');
    icon.textContent=t.name;
    var meta=document.createElement('div');meta.className='tbl-meta';
    var nm=document.createElement('div');nm.className='tbl-nm';nm.textContent=t.name;
    var sb=document.createElement('div');sb.className='tbl-sb';sb.textContent=t.type==='circle'?'Redonda':'Cuadrada'+(t.sub?' · '+t.sub:'');
    meta.appendChild(nm);meta.appendChild(sb);
    var del=document.createElement('button');del.className='del-btn';del.textContent='✕';
    del.addEventListener('click',function(e){e.stopPropagation();deleteTable(t);});
    row.appendChild(icon);row.appendChild(meta);row.appendChild(del);
    row.addEventListener('click',function(){selectTable(t);});
    list.appendChild(row);
  });
}

function selectTable(t){
  selected=t;
  render();renderList();
  showProps();
}

function showProps(){
  var panel=document.getElementById('props');
  if(!selected){panel.style.display='none';return;}
  panel.style.display='block';
  document.getElementById('p-name').value=selected.name;
  document.getElementById('p-sub').value=selected.sub||'';
  document.getElementById('tb-circle').className='type-btn'+(selected.type==='circle'?' active':'');
  document.getElementById('tb-rect').className='type-btn'+(selected.type==='rect'?' active':'');
  document.getElementById('row-r').style.display=selected.type==='circle'?'flex':'none';
  document.getElementById('row-wh').style.display=selected.type==='rect'?'flex':'none';
  if(selected.type==='circle')document.getElementById('p-r').value=selected.r||37;
  else{document.getElementById('p-w').value=selected.w||72;document.getElementById('p-h').value=selected.h||72;}
}

['p-name','p-sub','p-r','p-w','p-h'].forEach(function(id){
  document.getElementById(id).addEventListener('input',function(){
    if(!selected)return;
    if(id==='p-name')selected.name=this.value;
    else if(id==='p-sub')selected.sub=this.value;
    else if(id==='p-r')selected.r=parseInt(this.value)||37;
    else if(id==='p-w')selected.w=parseInt(this.value)||72;
    else if(id==='p-h')selected.h=parseInt(this.value)||72;
    render();renderList();saveTables();
  });
});

function setType(type){
  if(!selected)return;
  if(type==='circle'){
    selected.type='circle';
    var cx=selected.cx||(selected.x||(0))+(selected.w||72)/2;
    var cy=selected.cy||(selected.y||(0))+(selected.h||72)/2;
    selected.cx=cx;selected.cy=cy;selected.r=selected.r||37;
    delete selected.x;delete selected.y;delete selected.w;delete selected.h;
  } else {
    selected.type='rect';
    var x=selected.x||(selected.cx||(0))-(selected.r||37);
    var y=selected.y||(selected.cy||(0))-(selected.r||37);
    selected.x=x;selected.y=y;selected.w=selected.w||72;selected.h=selected.h||72;
    delete selected.cx;delete selected.cy;delete selected.r;
  }
  showProps();render();renderList();saveTables();
}

function addTable(type){
  var t={id:nextId++,name:String(tables.length+1),sub:'',type:type};
  if(type==='circle'){t.cx=720;t.cy=520;t.r=37;}
  else{t.x=680;t.y=480;t.w=72;t.h=72;}
  tables.push(t);saveTables();selectTable(t);toast('Mesa añadida — arrástrala al lugar correcto');
}

function deleteTable(t){
  if(!confirm('Eliminar "'+t.name+'"?'))return;
  tables=tables.filter(function(x){return x!==t;});
  if(selected===t){selected=null;showProps();}
  saveTables();
}

// ── DRAG ──
function svgPt(e){
  var svg=document.getElementById('fp');
  var pt=svg.createSVGPoint();
  var src=e.changedTouches?e.changedTouches[0]:e;
  pt.x=src.clientX;pt.y=src.clientY;
  return pt.matrixTransform(svg.getScreenCTM().inverse());
}

function startDrag(e,t){
  e.preventDefault();e.stopPropagation();
  drag.active=true;drag.t=t;drag.startPt=svgPt(e);
  if(t.type==='circle'){drag.origPos={cx:t.cx,cy:t.cy};}
  else{drag.origPos={x:t.x,y:t.y};}
  selectTable(t);
  document.getElementById('fp').classList.add('dragging');
}
document.addEventListener('mousemove',moveDrag);
document.addEventListener('touchmove',moveDrag,{passive:false});
document.addEventListener('mouseup',endDrag);
document.addEventListener('touchend',endDrag);

function moveDrag(e){
  if(!drag.active)return;
  e.preventDefault();
  var pt=svgPt(e);
  var dx=pt.x-drag.startPt.x,dy=pt.y-drag.startPt.y;
  var snap=20;
  var t=drag.t;
  if(t.type==='circle'){
    t.cx=Math.round((drag.origPos.cx+dx)/snap)*snap;
    t.cy=Math.round((drag.origPos.cy+dy)/snap)*snap;
  } else {
    t.x=Math.round((drag.origPos.x+dx)/snap)*snap;
    t.y=Math.round((drag.origPos.y+dy)/snap)*snap;
  }
  render();
}
function endDrag(){
  if(!drag.active)return;
  drag.active=false;
  document.getElementById('fp').classList.remove('dragging');
  saveTables();
}

function toast(msg){var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(function(){el.classList.remove('show');},2400);}

checkAuth();
</script>
