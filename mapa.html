<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#06061a;--surface:#0e0c24;--surface2:#14122e;
  --accent:#b44fff;--cyan:#06c8e8;--border:rgba(255,255,255,0.1);
  --text:#f0f0f0;--muted:#888;
  --font:'Barlow Condensed',sans-serif;--mono:'Space Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;}
#lock{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.lock-logo{font-size:28px;font-weight:700;background:linear-gradient(135deg,#b44fff,#06c8e8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
#app{display:none;flex-direction:column;height:100vh;}
#hdr{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);height:50px;flex-shrink:0;}
.logo{font-size:18px;font-weight:700;background:linear-gradient(135deg,#b44fff,#06c8e8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.spacer{flex:1;}
#sync-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);}
#sync-dot.off{background:var(--muted);}
.hbtn{background:none;border:none;color:var(--muted);font-family:var(--mono);font-size:10px;cursor:pointer;padding:4px 8px;}
#modebar{display:flex;padding:8px 12px;gap:8px;background:var(--surface2);border-bottom:1px solid var(--border);align-items:center;flex-shrink:0;}
.mbtn{flex:1;padding:10px;border:1px solid var(--border);border-radius:10px;background:var(--surface);color:var(--muted);font-family:var(--mono);font-size:11px;cursor:pointer;text-align:center;touch-action:manipulation;}
.mbtn.active{background:rgba(180,79,255,0.2);border-color:var(--accent);color:var(--accent);font-weight:700;}
.mbtn.active-edit{background:rgba(6,200,232,0.15);border-color:var(--cyan);color:var(--cyan);font-weight:700;}
#hint{font-family:var(--mono);font-size:9px;color:var(--muted);text-align:center;flex:2;}
#wrap{flex:1;overflow:auto;background:var(--bg);padding:0;display:flex;flex-direction:column;}
#fp-box{width:100%;background:#fff;flex-shrink:0;}
#fp{display:block;width:100%;height:auto;font-family:'Space Mono',monospace;}
/* SVG table styles */
.tbl-g{cursor:pointer;-webkit-tap-highlight-color:transparent;}
.tbl-g .tbl-shape{transition:filter 0.15s;}
.tbl-g.selected .tbl-shape{filter:drop-shadow(0 0 8px rgba(180,79,255,0.9));stroke:#b44fff !important;stroke-width:5 !important;}
/* Info sheet */
#info-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:300;}
#info-overlay.open{display:block;}
#info-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:2px solid var(--accent);border-radius:20px 20px 0 0;padding:20px 20px 40px;z-index:301;transform:translateY(100%);transition:transform 0.3s;max-height:85vh;overflow-y:auto;}
#info-sheet.open{transform:translateY(0);}
.sh-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px;}
.sh-name{font-size:46px;font-weight:700;color:var(--accent);font-family:var(--font);line-height:1;}
.sh-sub{font-family:var(--mono);font-size:11px;color:var(--muted);margin:4px 0 14px;}
.sh-close{position:absolute;top:20px;right:20px;background:var(--surface2);border:none;color:var(--muted);width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;}
#summary{display:flex;gap:12px;padding:6px 14px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;align-items:center;}
.sum-item{font-family:var(--mono);font-size:10px;color:var(--muted);}
.sum-item span{color:var(--text);font-weight:700;}
#legend{display:flex;gap:14px;padding:5px 14px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;}
.leg{font-family:var(--mono);font-size:9px;color:var(--muted);display:flex;align-items:center;gap:4px;}
.leg-dot{width:8px;height:8px;border-radius:50%;border:1.5px solid #33312c;}
#map-tabs{display:flex;overflow-x:auto;gap:6px;padding:6px 10px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
#map-tabs::-webkit-scrollbar{display:none;}
.map-tab{flex-shrink:0;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-family:var(--mono);font-size:11px;cursor:pointer;white-space:nowrap;touch-action:manipulation;}
.map-tab.active{background:rgba(180,79,255,0.2);border-color:var(--accent);color:var(--accent);font-weight:700;}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--accent);color:#000;font-family:var(--mono);font-size:11px;font-weight:700;padding:10px 20px;border-radius:20px;transition:transform 0.3s;z-index:600;pointer-events:none;}
#toast.show{transform:translateX(-50%) translateY(0);}
@keyframes spin{from{transform-origin:center;transform:rotate(0deg);}to{transform-origin:center;transform:rotate(360deg);}}
</style>
</head>
<body>
<div id="dbg" style="display:none"></div>
<div id="lock">
  <div style="font-size:40px">🔐</div>
  <div class="lock-logo">HÅNDSLAG</div>
  <div style="font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center;line-height:1.8" id="lock-msg">Verificando acceso...</div>
  <button style="display:none;font-family:var(--mono);font-size:11px;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:8px;cursor:pointer" id="lock-back" onclick="goBack()" id="btn-back-lock">← Back</button>
</div>
<div id="app">
  <div id="hdr">
    <button class="hbtn" onclick="goBack()" id="btn-back-top">← Back</button>
    <span class="logo">Håndslag</span>
    <div class="spacer"></div>
    <div id="sync-dot"></div>
  </div>
  <div style="display:flex;align-items:center;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;">
    <div id="map-tabs" style="flex:1;min-width:0;"></div>
  </div>
  <div id="modebar">
    <span id="hint" style="flex:1;text-align:center"></span>
    <div id="admin-panel" style="display:none;gap:6px;align-items:center;"></div>
  </div>
  <div id="summary">
    <div class="sum-item"><span id="lbl-checkin">Check-in</span>: <span id="sum-checkin">—</span></div>
    <div class="sum-item"><span id="lbl-tables">Tables</span>: <span id="sum-mesas">—</span></div>
    <div class="sum-item"><span id="lbl-complete">Complete</span>: <span id="sum-completas">—</span></div>
  </div>
  <div id="legend">
    <div class="leg"><div class="leg-dot" style="background:#fff"></div><span id="leg-free">Free</span></div>
    <div class="leg"><div class="leg-dot" style="background:#e8a838;border-color:#c07010"></div><span id="leg-occ">Occupied</span></div>
    <div class="leg"><div class="leg-dot" style="background:#27ae60;border-color:#1e8449"></div><span id="leg-full">Complete</span></div>
    <div class="leg"><div class="leg-dot" style="background:#e05252;border-color:#c0392b"></div><span id="leg-exp">Hold expired</span></div>
  </div>
  <div id="wrap">
    <div id="fp-box">
      <svg id="fp" viewBox="30 90 1380 920" width="100%">
        <g id="room-layer"></g>
        <g id="objects-layer"></g>
        <g id="tables-layer"></g>
      </svg>
    </div>
  </div>
</div>

<!-- Info sheet -->
<div id="info-overlay" onclick="closeInfo()"></div>
<div id="info-sheet">
  <button class="sh-close" onclick="closeInfo()">✕</button>
  <div class="sh-handle"></div>
  <div class="sh-name" id="info-name"></div>
  <div class="sh-sub" id="info-sub"></div>
  <div id="info-time" style="font-family:var(--mono);font-size:13px;color:var(--cyan);margin:6px 0 4px;display:none"></div>
  <div id="info-count" style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:14px"></div>
  <div id="info-guests"></div>
  <div id="info-link-btn" style="margin-top:12px;display:none"></div>
  <div id="info-clear-btn" style="margin-top:8px;display:none"></div>
</div>

<div id="toast"></div>

var mt = _mt[_lang] || _mt.en;
function applyMapLang() {
  var set = function(id,v){var el=document.getElementById(id);if(el)el.textContent=v;};
  document.getElementById('hint').textContent = mt.hint;
  set('lbl-checkin', mt.checkin); set('lbl-tables', mt.tables); set('lbl-complete', mt.complete);
  set('leg-free', mt.free); set('leg-occ', mt.occupied); set('leg-full', mt.complete); set('leg-exp', mt.expired);
  var b1=document.getElementById('btn-back-top'); if(b1) b1.textContent=mt.back;
  var b2=document.getElementById('btn-back-lock'); if(b2) b2.textContent=mt.back;
}
const FB_CFG={apiKey:"AIzaSyBR0HsO3WM-Db-1QACcrY789oiXaCR8zpA",authDomain:"handslag-fdd42.firebaseapp.com",databaseURL:"https://handslag-fdd42-default-rtdb.europe-west1.firebasedatabase.app",projectId:"handslag-fdd42",storageBucket:"handslag-fdd42.appspot.com",messagingSenderId:"1090291987706",appId:"1:1090291987706:web:0effe68dc7e7faa1ef06cd"};
dbg('firebase scripts loaded: '+(typeof firebase));
var _fbApp;
try{_fbApp=firebase.initializeApp(FB_CFG);dbg('Firebase init OK');}catch(e){dbg('initializeApp err: '+e.message);try{_fbApp=firebase.app();dbg('reused existing app');}catch(e2){_fbApp=null;dbg('no firebase app: '+e2.message);}}
const db=_fbApp?firebase.database(_fbApp):null;
dbg('db='+(db?'OK':'null'));


let tables=[],tableStats={},nextId=200;

function checkAuth(){ dbg('checkAuth called');
  var user=null;
  try{user=JSON.parse(sessionStorage.getItem('hs_currentUser'));}catch(e){}
  if(!user){try{user=JSON.parse(localStorage.getItem('hs_currentUser'));}catch(e){}}
  if(!user){
    var uname=sessionStorage.getItem('hs_loggedUsername')||localStorage.getItem('hs_loggedUsername');
    if(uname){db.ref('users').once('value',function(s){var all=s.val()||{};var f=Object.values(all).find(function(u){return u.username===uname;});if(f)grantAccess(f);else denyAccess();});return;}
    denyAccess();return;
  }
  grantAccess(user);
}
var currentMapId=null, _mapListeners=[];
function detachMapListeners(){_mapListeners.forEach(function(f){f();});_mapListeners=[];}

function switchToMap(mapId){
  if(!db)return;
  detachMapListeners();
  currentMapId=mapId;
  tables=[];objects=[];room={w:1260,h:800};
  render();
  // highlight active tab
  document.querySelectorAll('.map-tab').forEach(function(t){
    t.classList.toggle('active',t.dataset.id===mapId);
  });
  dbg('switching to: '+mapId);
  // room
  db.ref('mapa_v2/'+mapId+'/room').once('value',function(s){
    var r=s.val();if(r&&r.w&&r.h){room={w:r.w,h:r.h};applyRoomVB(room);dbg('room: '+r.w+'x'+r.h);}
  });
  // objects
  var oRef=db.ref('mapa_v2/'+mapId+'/objects');
  var oHandler=oRef.on('value',function(s){
    var raw=s.val();
    objects=raw?(Array.isArray(raw)?raw:Object.values(raw)).filter(function(x){return x&&typeof x==='object';}):[];
    render();
  });
  _mapListeners.push(function(){oRef.off('value',oHandler);});
  // tables
  var tRef=db.ref('mapa_v2/'+mapId+'/tables');
  var tHandler=tRef.on('value',function(s){
    var raw=s.val();
    if(raw){
      var arr=(Array.isArray(raw)?raw:Object.values(raw)).filter(function(x){return x&&x!==null&&typeof x==='object'&&!('__v' in x);});
      tables=arr;
      if(arr.length)nextId=Math.max(nextId,...arr.map(function(t){return t.id||0;}))+1;
      dbg('tables: '+arr.length);
    } else {tables=[];dbg('no tables');}
    render();
  });
  _mapListeners.push(function(){tRef.off('value',tHandler);});
}

function buildMapTabs(mapIds, defaultId){
  var bar=document.getElementById('map-tabs');
  bar.innerHTML='';
  mapIds.forEach(function(id){
    var btn=document.createElement('button');
    btn.className='map-tab'+(id===defaultId?' active':'');
    btn.dataset.id=id;
    btn.textContent=id;
    btn.onclick=function(){switchToMap(id);};
    bar.appendChild(btn);
  });
}

function grantAccess(user){
  dbg('grantAccess started');
  document.getElementById('lock').style.display='none';
  document.getElementById('app').style.display='flex';
  dbg('lock hidden, app shown');
  try{applyMapLang();dbg('applyMapLang OK');}catch(e){dbg('applyMapLang ERR: '+e.message);}
  try{initAdminPanel();}catch(e){}
  tables=[]; objects=[]; room={w:1260,h:800};
  try{render();dbg('render OK');}catch(e){dbg('render ERR: '+e.message);}
  if(db){loadTableStats();dbg('loadTableStats called');}
  if(db){db.ref('.info/connected').on('value',function(s){document.getElementById('sync-dot').className=s.val()?'':'off';});}
  if(db){
    // Load map list and active map in parallel
    Promise.all([
      db.ref('mapa_v2/__maps').once('value'),
      db.ref('mapa_v2/__active').once('value')
    ]).then(function(snaps){
      var mapsSnap=snaps[0], activeSnap=snaps[1];
      var mapsObj=mapsSnap.val()||{};
      var _mapOrder=['main-bar','backyard','golden-chimp'];
      var mapIds=Object.keys(mapsObj).sort(function(a,b){
        var ai=_mapOrder.indexOf(a),bi=_mapOrder.indexOf(b);
        if(ai<0)ai=999; if(bi<0)bi=999;
        return ai!==bi?ai-bi:a.localeCompare(b);
      });
      var activeMap=activeSnap.val()||mapIds[0]||'main';
      if(mapIds.length===0)mapIds=[activeMap];
      if(mapIds.indexOf(activeMap)<0)activeMap=mapIds[0];
      dbg('maps: '+mapIds.join(',')+' active: '+activeMap);
      buildMapTabs(mapIds, activeMap);
      switchToMap(activeMap);
    });
  }
}
function denyAccess(){
  document.getElementById('lock-msg').innerHTML=mt.noSession;
  document.getElementById('lock-back').style.display='block';
}
function goBack(){window.location.href='index.html';}



var _currentInfoTable=null;

function _saveTablesFirebase(){
  if(!db||!currentMapId) return;
  db.ref('mapa_v2/'+currentMapId+'/tables').set(tables.map(function(t){
    var o={id:t.id,name:t.name,type:t.type};
    if(t.type==='circle'){o.cx=t.cx;o.cy=t.cy;o.r=t.r||37;}
    else{o.x=t.x;o.y=t.y;o.w=t.w||72;o.h=t.h||72;}
    if(t.cap)o.cap=t.cap;
    if(t.label)o.label=t.label;
    if(t.linkedTo)o.linkedTo=t.linkedTo;
    return o;
  }));
}

function _highlightTable(t, on){
  var existing=document.getElementById('link-highlight');
  if(existing) existing.parentNode&&existing.parentNode.removeChild(existing);
  if(!on||!t) return;
  var layer=document.getElementById('tables-layer');
  var cx,cy,r;
  if(t.type==='circle'){cx=t.cx;cy=t.cy;r=(t.r||37)+12;}
  else{cx=(t.x||0)+(t.w||72)/2;cy=(t.y||0)+(t.h||72)/2;r=Math.max(t.w||72,t.h||72)/2+12;}
  var ring=svgEl('circle',{id:'link-highlight',cx:cx,cy:cy,r:r,fill:'none',stroke:'#b44fff','stroke-width':'3','stroke-dasharray':'6,3',opacity:'0.9','pointer-events':'none'});
  ring.style.animation='spin 2s linear infinite';
  layer.appendChild(ring);
}

function _linkSearch(){
  var v=(document.getElementById('link-search')||{}).value||'';
  var src=_currentInfoTable;
  if(!src) return;
  var others=tables.filter(function(x){return x.id!==src.id;});
  var filtered=v?others.filter(function(x){
    return String(x.name).toLowerCase().indexOf(v.toLowerCase())>=0||
           (x.label||'').toLowerCase().indexOf(v.toLowerCase())>=0;
  }):others;
  var items=filtered.map(function(x){
    var already=x.linkedTo&&x.linkedTo!==src.id;
    return '<button onclick="doLink('+x.id+')" style="display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:10px 14px;margin-bottom:6px;background:var(--surface2);border:1px solid '+(already?'rgba(180,79,255,0.3)':'var(--border)')+';border-radius:10px;color:var(--text);font-family:var(--font);font-size:16px;font-weight:700;cursor:pointer;">'
      +'<span style="width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;">'+x.name+'</span>'
      +(already?'<span style="color:#b44fff;font-size:11px;">'+mt.alreadyLinked+'</span>':'<span>Mesa '+x.name+'</span>')
      +'</button>';
  }).join('');
  if(!filtered.length) items='<div style="color:var(--muted);font-family:var(--mono);font-size:12px;text-align:center;padding:16px;">'+mt.noResults+'</div>';
  var ll=document.getElementById('link-list');
  if(ll) ll.innerHTML=items;
}

function linkTable(t){
  _currentInfoTable=t;
  _highlightTable(t, true);
  document.getElementById('info-guests').innerHTML=

function doLink(targetId){
  var src=_currentInfoTable;
  var tgt=tables.find(function(x){return x.id===targetId;});
  if(!src||!tgt) return;
  src.linkedTo=tgt.id;
  tgt.linkedTo=src.id;
  _highlightTable(null, false);
  _saveTablesFirebase();
  render();
  toast('🔗 '+src.name+' → '+tgt.name);
  closeInfo();
}

function doUnlink(tableId){
  var t=tables.find(function(x){return x.id===tableId;});
  if(!t||!t.linkedTo) return;
  var partner=tables.find(function(x){return x.id===t.linkedTo;});
  t.linkedTo=null; t.linkedGroup=null;
  if(partner){partner.linkedTo=null;partner.linkedGroup=null;}
  _saveTablesFirebase();
  render();
  toast(mt.unlinkBtn+' ✓');
  closeInfo();
}

function loadTableStats(){
  if(!db) return;
  var today=new Date().toISOString().slice(0,10);
  db.ref('events/'+today).on('value',function(snap){
    var all=snap.val()||{};
    var stats={};
    Object.values(all).forEach(function(cat){
      var list=Array.isArray(cat)?cat:Object.values(cat);
      list.forEach(function(g){
        if(g&&g.table){
          var k=String(g.table).toLowerCase();
          if(!stats[k])stats[k]={count:0,checked:0,expired:false,anyCheckedIn:false};
          var total=1+(parseInt(g.guests)||0);
          var chk=(g.checkedIn?1:0)+(parseInt(g.guestsIn)||0);
          stats[k].count+=total;
          stats[k].checked+=chk;
          if(g.checkedIn) stats[k].anyCheckedIn=true;
          if(g.timeFrom&&!g.checkedIn){
            var nowMin=new Date().getHours()*60+new Date().getMinutes();
            var fp=g.timeFrom.split(':');
            var fromMin=parseInt(fp[0])*60+parseInt(fp[1]);
            var hold=g.paid?60:30;
            if(nowMin>fromMin+hold) stats[k].expired=true;
          }
        }
      });
    });
    tableStats=stats;
    // Update summary bar
    var totalPeople=0,checkedPeople=0,occupiedTables=0,completeTables=0;
    Object.values(stats).forEach(function(s){
      totalPeople+=s.count; checkedPeople+=s.checked; occupiedTables++;
      if(s.checked>=s.count)completeTables++;
    });
    document.getElementById('sum-checkin').textContent=checkedPeople+'/'+totalPeople;
    document.getElementById('sum-mesas').textContent=occupiedTables;
    document.getElementById('sum-completas').textContent=completeTables;
    render();
  });
}

var NS='http://www.w3.org/2000/svg';
var objects=[], room={w:1260,h:800};
function svgEl(tag,attrs){
  var el=document.createElementNS(NS,tag);
  Object.keys(attrs).forEach(function(k){el.setAttribute(k,attrs[k]);});
  return el;
}

function applyRoomVB(r){
  room=r||{w:1260,h:800};
  var cx=720,cy=550,pad=60;
  var x=cx-room.w/2,y=cy-room.h/2;
  document.getElementById('fp').setAttribute('viewBox',(x-pad)+' '+(y-pad)+' '+(room.w+pad*2)+' '+(room.h+pad*2));
}

function renderRoom(){
  var layer=document.getElementById('room-layer');
  while(layer.firstChild)layer.removeChild(layer.firstChild);
  var cx=720,cy=550,x=cx-room.w/2,y=cy-room.h/2,x2=cx+room.w/2,y2=cy+room.h/2;
  layer.appendChild(svgEl('rect',{x:x,y:y,width:room.w,height:room.h,fill:'#faf7f1'}));
  var b=document.createElementNS(NS,'g');
  b.setAttribute('stroke','#33312c');b.setAttribute('stroke-width','7');b.setAttribute('stroke-linecap','round');b.setAttribute('fill','none');
  [[x,y,x2,y],[x,y,x,y2],[x2,y,x2,y2],[x,y2,x2,y2]].forEach(function(l){b.appendChild(svgEl('line',{x1:l[0],y1:l[1],x2:l[2],y2:l[3]}));});
  layer.appendChild(b);
}

function renderObjects(){

    } else if(o.type==='door'){
      var sz=o.size||80;
      var inn=document.createElementNS(NS,'g');

      inn.appendChild(svgEl('rect',{x:-sz/2,y:0,width:sz,height:8,rx:'3',fill:'#8d6e63'}));

      var dlbl=svgEl('text',{x:'0',y:'-8','text-anchor':'middle','font-size':'11','font-weight':'700','font-family':'Space Mono,monospace',fill:'#8d6e63','pointer-events':'none'});
      dlbl.textContent='PUERTA';inn.appendChild(dlbl);g.appendChild(inn);

      inn.appendChild(svgEl('rect',{x:-len/2,y:-6,width:len,height:12,rx:'4',fill:'#a09080'}));

      inn.appendChild(svgEl('circle',{cx:0,cy:0,r:pr,fill:'#4caf50',opacity:'0.85'}));
      inn.appendChild(svgEl('circle',{cx:-pr*0.3,cy:-pr*0.2,r:pr*0.35,fill:'#388e3c'}));
      inn.appendChild(svgEl('circle',{cx:pr*0.3,cy:-pr*0.1,r:pr*0.3,fill:'#43a047'}));
      g.appendChild(inn);
    } else if(o.type==='chair'){
      var sz=o.size||28;
      var inn=document.createElementNS(NS,'g');
      inn.setAttribute('transform','translate('+ox+','+oy+') rotate('+rot+')');
      inn.appendChild(svgEl('rect',{x:-sz/2,y:-sz*0.1,width:sz,height:sz*0.7,rx:String(sz*0.12),fill:'#a1887f'}));
      inn.appendChild(svgEl('rect',{x:-sz/2,y:-sz/2,width:sz,height:sz*0.35,rx:String(sz*0.1),fill:'#6b5a4e'}));

function tableCenter(t){
  if(t.type==='circle') return {x:t.cx,y:t.cy};
  return {x:(t.x||0)+(t.w||72)/2, y:(t.y||0)+(t.h||72)/2};
}

function render(){
  renderRoom();
  renderObjects();
  var layer=document.getElementById('tables-layer');
  while(layer.firstChild)layer.removeChild(layer.firstChild);

  // Draw connection line between linked table pairs
  var drawn={};
  tables.forEach(function(t){
    if(!t.linkedTo) return;
    var key=[Math.min(t.id,t.linkedTo),Math.max(t.id,t.linkedTo)].join('-');
    if(drawn[key]) return;
    drawn[key]=true;
    var partner=tables.find(function(x){return x.id===t.linkedTo;});
    if(!partner) return;
    function tCenter(tb){
      if(tb.type==='circle') return {x:tb.cx,y:tb.cy};
      return {x:(tb.x||0)+(tb.w||72)/2,y:(tb.y||0)+(tb.h||72)/2};
    }
    var c1=tCenter(t), c2=tCenter(partner);
    var mx=(c1.x+c2.x)/2, my=(c1.y+c2.y)/2;
    // Glow line
    var glow=svgEl('line',{x1:c1.x,y1:c1.y,x2:c2.x,y2:c2.y,stroke:'rgba(180,79,255,0.25)','stroke-width':'10','stroke-linecap':'round','pointer-events':'none'});
    layer.appendChild(glow);
    // Main dashed line
    var line=svgEl('line',{x1:c1.x,y1:c1.y,x2:c2.x,y2:c2.y,stroke:'#b44fff','stroke-width':'2.5','stroke-dasharray':'8,5','stroke-linecap':'round',opacity:'0.9','pointer-events':'none'});
    layer.appendChild(line);
    // Dots at each end
    [c1,c2].forEach(function(c){
      var dot=svgEl('circle',{cx:c.x,cy:c.y,r:'5',fill:'#b44fff',opacity:'0.8','pointer-events':'none'});
      layer.appendChild(dot);
    });
    // Label at midpoint
    var pill=svgEl('rect',{x:mx-28,y:my-11,width:56,height:22,rx:'11',fill:'#b44fff','pointer-events':'none'});
    var lbl=svgEl('text',{x:mx,y:my+1,'text-anchor':'middle','dominant-baseline':'middle','font-size':'11','font-weight':'700','font-family':'Space Mono,monospace',fill:'#fff','pointer-events':'none'});
    lbl.textContent='GRUPO';
    layer.appendChild(pill);
    layer.appendChild(lbl);
  });
  tables.forEach(function(t){
    var g=document.createElementNS(NS,'g');
    g.setAttribute('class','tbl-g');
    g.setAttribute('data-id',t.id);

    var stat=tableStats[String(t.name).toLowerCase()];
    var occupied=!!stat;
    var assigned=occupied?stat.count:0;
    var maxP=t.cap?parseInt(t.cap):0;
    var complete=occupied&&stat.checked>=stat.count;
    var expired=occupied&&!complete&&stat.expired&&!stat.anyCheckedIn;
    var overCapacity=maxP>0&&assigned>maxP;
    var atCapacity=maxP>0&&assigned===maxP;

    // Determine if this is a "secondary" table — linked, no reservation here, but partner has one
    var partner=t.linkedTo?tables.find(function(x){return x.id===t.linkedTo;}):null;
    var partnerStat=partner?tableStats[String(partner.name).toLowerCase()]:null;
    var isSecondary=!!t.linkedTo&&!occupied&&!!partnerStat;

    var fillColor,strokeColor,strokeW='3',numColor;
    if(isSecondary){
      // Mirror partner's color at reduced opacity — table is "absorbed" into primary
      var ps=partnerStat;
      var pc=ps.checked>=ps.count?'#27ae60':ps.expired?'#e05252':'#e8a838';
      fillColor=pc; strokeColor='#b44fff'; strokeW='3'; numColor='rgba(255,255,255,0.5)';
    } else if(overCapacity){
      fillColor='#c0392b'; strokeColor='#922b21'; strokeW='5'; numColor='#fff';
    } else if(atCapacity||complete){
      fillColor='#27ae60'; strokeColor='#1e8449'; numColor='#fff';
    } else if(expired){
      fillColor='#e05252'; strokeColor='#c0392b'; numColor='#fff';
    } else if(occupied){
      fillColor='#e8a838'; strokeColor='#c07010'; numColor='#fff';
    } else {
      fillColor='#fff'; strokeColor='#33312c'; numColor='#33312c';
    }

    var isLinked=!!t.linkedTo;
    var shape,tx,ty;
    if(t.type==='circle'){
      var r=t.r||37;
      shape=svgEl('circle',{cx:t.cx,cy:t.cy,r:r,fill:fillColor,stroke:isLinked?'#b44fff':strokeColor,'stroke-width':isLinked?'4':strokeW,'opacity':isSecondary?'0.45':'1',class:'tbl-shape'});
      tx=t.cx; ty=t.cy+(occupied?-8:9);
    } else {
      var w=t.w||72,h=t.h||72;
      shape=svgEl('rect',{x:t.x,y:t.y,width:w,height:h,rx:'7',fill:fillColor,stroke:isLinked?'#b44fff':strokeColor,'stroke-width':isLinked?'4':strokeW,'opacity':isSecondary?'0.45':'1',class:'tbl-shape'});
      tx=t.x+w/2; ty=t.y+h/2+(occupied?-8:10);
    }
    g.appendChild(shape);

    if(isSecondary){
      // Secondary table: just show a faded number, no other info
      var stxt=svgEl('text',{x:tx,y:ty+6,'text-anchor':'middle','font-size':String(t.name).length>2?'18':'22','font-weight':'700',fill:'rgba(255,255,255,0.4)','pointer-events':'none',opacity:'0.6'});
      stxt.textContent=t.name;
      g.appendChild(stxt);
      // Click opens the primary table's info
      g.addEventListener('click',function(e){e.stopPropagation();if(partner)openInfo(partner);});
    } else {
      // Primary or unlinked table — full rendering
      var txt=svgEl('text',{x:tx,y:ty,'text-anchor':'middle','font-size':String(t.name).length>2?'22':'28','font-weight':'700',fill:numColor,'pointer-events':'none'});
      txt.textContent=t.name;
      g.appendChild(txt);

      if(occupied&&assigned){
        var capStr=maxP?assigned+'/'+maxP:String(assigned);
        var capColor=overCapacity?'#f8c9c9':atCapacity?'#d5f5e3':'#fff';
        var cnt=svgEl('text',{x:tx,y:ty+20,'text-anchor':'middle','font-size':'16','font-weight':'700',fill:capColor,'pointer-events':'none'});
        cnt.textContent=capStr+'p';
        g.appendChild(cnt);
      } else if(!occupied&&maxP){
        var cap0=svgEl('text',{x:tx,y:ty+18,'text-anchor':'middle','font-size':'13',fill:'#aaa','pointer-events':'none'});
        cap0.textContent='máx '+maxP;
        g.appendChild(cap0);
      }

      if(overCapacity){
        var bx=t.type==='circle'?t.cx+(t.r||37)-8:t.x+(t.w||72)-8;
        var by=t.type==='circle'?t.cy-(t.r||37)+8:t.y+8;
        var badge=svgEl('circle',{cx:bx,cy:by,r:'10',fill:'#f39c12','pointer-events':'none'});
        var badgeTxt=svgEl('text',{x:bx,y:by+4,'text-anchor':'middle','font-size':'12','font-weight':'700',fill:'#000','pointer-events':'none'});
        badgeTxt.textContent='!';
        g.appendChild(badge);g.appendChild(badgeTxt);
      }

      g.addEventListener('click',function(e){e.stopPropagation();openInfo(t);});
    }

    layer.appendChild(g);
  });
}

        var nowMin=new Date().getHours()*60+new Date().getMinutes();
        var expired2=false;
        if(g.timeFrom){var fp2=g.timeFrom.split(':');expired2=nowMin>parseInt(fp2[0])*60+parseInt(fp2[1])+holdMin&&!g.checkedIn;}
        var holdLabel=g.paid?mt.paidHold:mt.freeHold;
        var timeColor=expired2?'#e05252':'var(--cyan)';
        var expiredTag=expired2?mt.expiredTag:'';
        lines.push('<div style="font-family:var(--mono);font-size:11px;color:'+timeColor+';margin-top:3px">🕐 '+(g.timeFrom||'?')+' – '+(g.timeTo||'?')+'  <span style="opacity:0.7">'+holdLabel+'</span>'+expiredTag+'</div>');
      }
      if(g.addedBy) lines.push('<div style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px">👤 '+g.addedBy+(g.addedAt?' · '+g.addedAt:'')+'</div>');
      if(g.checkedIn&&g.checkedAt) lines.push('<div style="font-family:var(--mono);font-size:11px;color:#27ae60;margin-top:3px">✓ '+mt.checkedAt+' '+g.checkedAt+'</div>');
      if(g.notes) lines.push('<div style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:4px;white-space:pre-wrap">'+g.notes+'</div>');
      lines.push('</div>');
      return lines.join('');
    }).join('')+addBtn;
  });
  document.getElementById('info-overlay').classList.add('open');
  document.getElementById('info-sheet').classList.add('open');
}
function closeInfo(){
  document.getElementById('info-overlay').classList.remove('open');
  document.getElementById('info-sheet').classList.remove('open');
}
function renameTable(t){
  var nameEl=document.getElementById('info-name');
  var current=String(t.name);
  nameEl.innerHTML='<input id="rename-input" type="text" value="'+current+'" maxlength="10" style="width:100%;font-size:inherit;font-weight:inherit;font-family:inherit;color:inherit;background:rgba(255,255,255,0.08);border:2px solid var(--accent);border-radius:8px;padding:4px 8px;text-align:center;box-sizing:border-box;">'
    +'<div style="display:flex;gap:8px;margin-top:8px;">'
    +'<button onclick="_confirmRename('+t.id+')" style="flex:1;padding:8px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-family:var(--mono);font-size:13px;cursor:pointer;font-weight:700;">✓</button>'
    +'<button onclick="openInfo(_currentInfoTable)" style="flex:1;padding:8px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:var(--mono);font-size:13px;cursor:pointer;">✕</button>'
    +'</div>';
  var inp=document.getElementById('rename-input');
  inp.focus();inp.select();
  inp.addEventListener('keydown',function(e){
    if(e.key==='Enter')_confirmRename(t.id);
    if(e.key==='Escape')openInfo(_currentInfoTable);
  });
}
function _confirmRename(tableId){
  var inp=document.getElementById('rename-input');
  if(!inp)return;
  var newName=(inp.value||'').trim();
  if(!newName){toast(mt.nameRequired||'Enter a name');return;}
  var t=tables.find(function(x){return x.id===tableId;});
  if(!t)return;
  var oldName=t.name;
  t.name=newName;
  _saveTablesFirebase();
  render();
  openInfo(t);
  toast('✓ '+oldName+' → '+newName);
}

function clearTableData(tableId){
  var t=tables.find(function(x){return x.id===tableId;});
  if(!t) return;
  if(!confirm(mt.clearConfirm.replace('%s',t.name))) return;
  var today=new Date().toISOString().slice(0,10);
  var ops=[];
  // Remove all reservations for this table
  ops.push(db.ref('events/'+today).once('value').then(function(snap){
    var all=snap.val()||{};
    var removes=[];
    Object.keys(all).forEach(function(cat){
      var catObj=all[cat]||{};
      Object.keys(catObj).forEach(function(gid){
        var g=catObj[gid];
        if(g&&g.table&&String(g.table).toLowerCase()===String(t.name).toLowerCase()){
          removes.push(db.ref('events/'+today+'/'+cat+'/'+gid).remove());
        }
      });
    });
    return Promise.all(removes);
  }));
  // Remove links
  if(t.linkedTo){
    var partner=tables.find(function(x){return x.id===t.linkedTo;});
    if(partner){partner.linkedTo=null;partner.linkedGroup=null;}
    t.linkedTo=null;t.linkedGroup=null;
    ops.push(Promise.resolve(_saveTablesFirebase()));
  }
  Promise.all(ops).then(function(){
    toast(mt.tableCleared.replace('%s',t.name));
    render();
    openInfo(t);
  });
}

function _rfS(){return 'width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:var(--font);font-size:15px;box-sizing:border-box;';}
function _esc(s){return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

function openResvForm(guestId, cat){
  var t=_currentInfoTable;
  if(!t) return;
  if(guestId){
    var today=new Date().toISOString().slice(0,10);
    db.ref('events/'+today+'/'+cat+'/'+guestId).once('value',function(snap){
      _resvMeta={cat:cat,guestId:guestId};
      _renderResvForm(t, snap.val());
    });
  } else {
    _resvMeta=null;
    _renderResvForm(t, null);
  }
}

function _renderResvForm(t, g){

  var el=document.getElementById('info-guests');

    '<div style="font-family:var(--mono);font-size:11px;color:var(--accent);margin-bottom:14px;text-transform:uppercase;letter-spacing:1px;">'
    +(g?mt.editResv:mt.newResv.replace('%s',t.name))+'</div>'
    +'<div style="display:flex;flex-direction:column;gap:10px;">'
    +'<input id="rf-name" type="text" placeholder="'+mt.namePlaceholder+'" value="'+_esc(g?g.name:'')
    +'" style="'+_rfS()+'">'
    +'<div style="display:flex;gap:8px;">'
    +'<div style="flex:1;"><div style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:4px;">'+mt.from+'</div>'
    +'<input id="rf-from" type="time" value="'+(g&&g.timeFrom?g.timeFrom:defTime)+'" style="'+_rfS()+'"></div>'
    +'<div style="flex:1;"><div style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:4px;">'+mt.to+'</div>'
    +'<input id="rf-to" type="time" value="'+(g&&g.timeTo?g.timeTo:'')
    +'" style="'+_rfS()+'"></div>'
    +'</div>'
    +'<div><div style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:4px;">'+mt.extraGuests+'</div>'
    +'<input id="rf-guests" type="number" min="0" max="99" value="'+(g?parseInt(g.guests)||0:0)
    +'" style="width:80px;text-align:center;'+_rfS()+'"></div>'
    +'<div><div style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:4px;">'+mt.notes+'</div>'
    +'<textarea id="rf-notes" placeholder="'+mt.optional+'" rows="2" style="resize:none;'+_rfS()+'">'+_esc(g&&g.notes?g.notes:'')+'</textarea></div>'
    +'</div>'
    +'<div style="display:flex;gap:8px;margin-top:14px;">'
    +'<button onclick="saveResvForm()" style="flex:2;padding:12px;background:var(--accent);border:none;border-radius:10px;color:#000;font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;">'+mt.save+'</button>'
    +'<button onclick="openInfo(_currentInfoTable)" style="flex:1;padding:12px;background:transparent;border:1px solid var(--border);border-radius:10px;color:var(--muted);font-family:var(--font);font-size:14px;cursor:pointer;">'+mt.cancel+'</button>'
    +'</div>';
  document.getElementById('info-sheet').scrollTop=0;
  setTimeout(function(){var n=document.getElementById('rf-name');if(n)n.focus();},120);
}

function saveResvForm(){
  var t=_currentInfoTable;
  if(!t) return;
  var name=(document.getElementById('rf-name').value||'').trim();
  if(!name){toast(mt.nameRequired);return;}
  var today=new Date().toISOString().slice(0,10);
  var now=new Date();
  var timeNow=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  var _u=null;try{_u=JSON.parse(sessionStorage.getItem('hs_currentUser')||localStorage.getItem('hs_currentUser'));}catch(e){}
  var cat=_resvMeta?_resvMeta.cat:'tables';
  var gId=_resvMeta?_resvMeta.guestId:Date.now();
  // Read existing record to preserve checkedIn state etc.
  var _doSave=function(existing){
    var guest={
      id:gId,
      name:name,
      table:String(t.name),
      guests:parseInt(document.getElementById('rf-guests').value)||0,
      timeFrom:document.getElementById('rf-from').value||'',
      timeTo:document.getElementById('rf-to').value||'',
      notes:(document.getElementById('rf-notes').value||'').trim(),
      paymentType:existing?existing.paymentType||'free':'free',
      paymentAmount:existing?existing.paymentAmount||0:0,
      checkedIn:existing?existing.checkedIn||false:false,
      guestsIn:existing?existing.guestsIn||0:0,
      checkedAt:existing?existing.checkedAt||'':'',
      addedBy:_u?(_u.username||_u.name):'map',
      addedAt:existing?existing.addedAt||timeNow:timeNow,
    };
    db.ref('events/'+today+'/'+cat+'/'+gId).set(guest).then(function(){
      toast(existing?mt.resvUpdated:mt.resvAdded);
      openInfo(t);
    });
  };
  if(_resvMeta){
    db.ref('events/'+today+'/'+cat+'/'+gId).once('value',function(s){_doSave(s.val());});
  } else {
    _doSave(null);
  }
}

function toggleCheckinMap(guestId, cat){
  var today=new Date().toISOString().slice(0,10);
  db.ref('events/'+today+'/'+cat+'/'+guestId).once('value',function(snap){
    var g=snap.val();
    if(!g) return;
    g.checkedIn=!g.checkedIn;
    var now=new Date();
    g.checkedAt=g.checkedIn?String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0'):'';
    db.ref('events/'+today+'/'+cat+'/'+guestId).set(g).then(function(){
      toast((g.checkedIn?mt.checkinToast:mt.checkoutToast)+g.name);
      openInfo(_currentInfoTable);
    });
  });
}

function toast(msg){var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(function(){el.classList.remove('show');},2200);}


// ── ADMIN TEST DATA ──
var _NAMES=['Alex','Sam','Jordan','Taylor','Morgan','Casey','Riley','Drew','Quinn','Blake','Avery','Jamie','Skyler','Logan','Reese','Parker','Hayden','Dakota','Sage','Rowan'];
var _NOTES=['Mesa VIP','Cumpleaños','Reserva grupo','Sin nota','Amigos del staff','Corporativo'];
function _uid(){return Math.random().toString(36).slice(2,9);}
function _pick(arr){return arr[Math.floor(Math.random()*arr.length)];}

function createTestData(){
  if(!db){toast('Error: sin Firebase');return;}
  if(!currentMapId){toast('Error: sin mapa activo');return;}
  if(!tables||tables.length===0){toast('Error: mapa sin mesas');return;}
  toast('Creando datos...');
  var today=new Date().toISOString().slice(0,10);
  var groups=[2,4,4,6,8,10];
  var shuffled=tables.slice().sort(function(){return Math.random()-0.5;});
  var writes=[];
  var reservedCount=0;

  // First chunk: solo reservations
  var soloCount=Math.ceil(groups.length*0.6);
  var soloTables=shuffled.slice(0,Math.min(soloCount,shuffled.length));
  soloTables.forEach(function(t,i){
    var size=groups[i]||2;
    var checkedIn=Math.random()>0.45;
    var paid=Math.random()>0.35;
    var guest={
      name:_pick(_NAMES)+' '+_pick(_NAMES),
      table:String(t.name||t.id),
      guests:size-1,
      guestsIn:checkedIn?Math.floor(Math.random()*size):0,
      checkedIn:checkedIn,paid:paid,
      paidAmount:paid?Math.round((size*80+Math.random()*200)/10)*10:0,
      timeFrom:(Math.floor(Math.random()*3)+21)+':'+(Math.random()>0.5?'30':'00'),
      notes:Math.random()>0.5?_pick(_NOTES):'',
      testData:true
    };
    writes.push(db.ref('events/'+today+'/test-'+_uid()+'/'+_uid()).set(guest));
    reservedCount++;
  });

  // Remaining: link pairs — pick spatially close tables so the envelope isn't giant
  var remaining=shuffled.slice(soloCount);
  // Sort remaining by position so adjacent tables get paired
  remaining.sort(function(a,b){
    var ax=a.type==='circle'?a.cx:(a.x||0)+(a.w||72)/2;
    var ay=a.type==='circle'?a.cy:(a.y||0)+(a.h||72)/2;
    var bx=b.type==='circle'?b.cx:(b.x||0)+(b.w||72)/2;
    var by=b.type==='circle'?b.cy:(b.y||0)+(b.h||72)/2;
    return (ax+ay)-(bx+by);
  });
  for(var i=0;i+1<remaining.length&&i<4;i+=2){
    var primary=remaining[i];
    var secondary=remaining[i+1];
    primary.linkedTo=secondary.id;
    secondary.linkedTo=primary.id;
    // Persist the linking to Firebase
    writes.push(db.ref('mapa_v2/'+currentMapId+'/tables').set(tables.map(function(t){
      var o={id:t.id,name:t.name,type:t.type};
      if(t.type==='circle'){o.cx=t.cx;o.cy=t.cy;o.r=t.r||37;}
      else{o.x=t.x;o.y=t.y;o.w=t.w||72;o.h=t.h||72;}
      if(t.cap)o.cap=t.cap;
      if(t.label)o.label=t.label;
      if(t.linkedTo)o.linkedTo=t.linkedTo;
      return o;
    })));
    var size=Math.min(groups[soloCount+i]||4,12);
    var checkedIn=Math.random()>0.5;
    var paid=Math.random()>0.4;
    var guest={
      name:_pick(_NAMES)+' '+_pick(_NAMES),
      table:String(primary.name||primary.id),
      guests:size-1,
      guestsIn:checkedIn?Math.floor(Math.random()*size):0,
      checkedIn:checkedIn,paid:paid,
      paidAmount:paid?Math.round((size*80+Math.random()*200)/10)*10:0,
      timeFrom:(Math.floor(Math.random()*3)+21)+':'+(Math.random()>0.5?'30':'00'),
      notes:'Grupo vinculado · '+_pick(_NOTES),
      testData:true
    };
    writes.push(db.ref('events/'+today+'/test-'+_uid()+'/'+_uid()).set(guest));
    reservedCount++;
  }

  Promise.all(writes).then(function(){
    render();
    toast('✓ '+reservedCount+' reservas + vínculos creados');
  }).catch(function(e){toast('Error: '+e.message);});
}

function deleteTestData(){
  if(!db){toast('Sin conexión');return;}
  var today=new Date().toISOString().slice(0,10);
  db.ref('events/'+today).once('value',function(snap){
    var all=snap.val()||{};
    var toDelete=[];
    Object.keys(all).forEach(function(cat){
      var catData=all[cat];
      if(typeof catData==='object'&&catData!==null){
        Object.keys(catData).forEach(function(gid){
          if(catData[gid]&&catData[gid].testData===true){
            toDelete.push(db.ref('events/'+today+'/'+cat+'/'+gid).remove());
          }
        });
        // If category name starts with 'test-', remove whole category
        if(cat.startsWith('test-')){
          toDelete.push(db.ref('events/'+today+'/'+cat).remove());
        }
      }
    });
    // Also remove test-created links from current map tables
    if(currentMapId&&tables&&tables.length){
      var hadLinks=tables.some(function(t){return t.linkedTo;});
      if(hadLinks){
        tables.forEach(function(t){delete t.linkedTo;});
        toDelete.push(db.ref('mapa_v2/'+currentMapId+'/tables').set(tables.map(function(t){
          var o={id:t.id,name:t.name,type:t.type};
          if(t.type==='circle'){o.cx=t.cx;o.cy=t.cy;o.r=t.r||37;}
          else{o.x=t.x;o.y=t.y;o.w=t.w||72;o.h=t.h||72;}
          if(t.cap)o.cap=t.cap;
          if(t.label)o.label=t.label;
          return o;
        })));
      }
    }
    if(toDelete.length===0){toast('No hay datos de prueba');return;}
    Promise.all(toDelete).then(function(){render();toast('🗑 Datos de prueba eliminados');}).catch(function(e){toast('Error: '+e.message);});
  });
}

}
