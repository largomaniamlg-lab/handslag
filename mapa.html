<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Håndslag — Mapa del Local</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green:#b44fff;--green-dark:#9333ea;--cyan:#06c8e8;
  --black:#06061a;--surface:#0e0c24;--surface2:#14122e;--surface3:#1e1a3a;
  --border:rgba(255,255,255,0.1);--text:#f0f0f0;--text-muted:#888;
  --font-d:'Barlow Condensed',sans-serif;--font-m:'Space Mono',monospace;
  --danger:#e05252;
}
html,body{height:100%;background:var(--black);color:var(--text);font-family:var(--font-d);overflow:hidden;}

/* ── LOCK SCREEN ── */
#lockScreen{position:fixed;inset:0;background:var(--black);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;}
#lockScreen .lock-logo{font-family:var(--font-d);font-size:28px;font-weight:700;letter-spacing:2px;color:var(--green);}
#lockScreen .lock-msg{font-family:var(--font-m);font-size:11px;color:var(--text-muted);text-align:center;line-height:1.8;}
#lockScreen .lock-icon{font-size:40px;margin-bottom:8px;}

/* ── HEADER ── */
#header{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);height:52px;flex-shrink:0;}
.logo{font-size:18px;font-weight:700;letter-spacing:1px;background:linear-gradient(135deg,#b44fff,#06c8e8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-transform:uppercase;font-family:var(--font-d);filter:drop-shadow(0 0 6px rgba(180,79,255,0.5));}
.page-title{font-size:13px;color:var(--text-muted);font-family:var(--font-m);}
.spacer{flex:1;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
.sync-dot.off{background:var(--text-muted);animation:none;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
#admin-badge{font-family:var(--font-m);font-size:9px;background:rgba(180,79,255,0.15);border:1px solid rgba(180,79,255,0.3);color:var(--green);padding:3px 8px;border-radius:20px;display:none;}

/* ── TOOLBAR ── */
#toolbar{display:flex;gap:6px;padding:8px 12px;background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center;flex-shrink:0;}
.tb-btn{display:flex;align-items:center;gap:5px;padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text);font-family:var(--font-m);font-size:10px;cursor:pointer;white-space:nowrap;transition:background 0.15s,border-color 0.15s;}
.tb-btn:hover{background:var(--surface3);border-color:rgba(255,255,255,0.2);}
.tb-btn.active{background:var(--green);color:#000;border-color:var(--green);font-weight:700;}
.tb-btn.primary{background:var(--green);color:#000;border-color:var(--green);font-weight:700;}
.tb-btn.primary:hover{background:var(--green-dark);}
.tb-btn.danger{border-color:rgba(224,82,82,0.4);color:var(--danger);}
.tb-btn.danger:hover{background:rgba(224,82,82,0.15);}
.tb-btn:disabled{opacity:0.3;cursor:not-allowed;}
.tb-sep{width:1px;height:24px;background:var(--border);margin:0 2px;}
#layout-select{font-family:var(--font-m);font-size:10px;padding:6px 8px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text);max-width:110px;}

/* ── MAIN ── */
#main{display:flex;flex:1;overflow:hidden;height:calc(100vh - 52px - 56px);}
#canvas-wrap{flex:1;overflow:auto;background:var(--black);padding:12px;}
#canvas-outer{transform-origin:top left;display:inline-block;}

/* ── CANVAS ── */
#canvas{position:relative;background:#0d0b22;border:1px solid var(--border);border-radius:12px;overflow:hidden;flex-shrink:0;}

/* ── ZONES / BARS ── */
.zone{position:absolute;border-radius:12px;pointer-events:none;}
.zone-label{position:absolute;font-family:var(--font-m);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.3);pointer-events:none;}
.bar-el{position:absolute;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--font-m);font-size:9px;color:rgba(255,255,255,0.4);letter-spacing:0.5px;pointer-events:none;}

/* ── TABLES ── */
.table-el{position:absolute;cursor:default;user-select:none;display:flex;align-items:center;justify-content:center;flex-direction:column;touch-action:none;}
.table-el.draggable{cursor:grab;}
.table-el.draggable:active{cursor:grabbing;}
.table-el.round{border-radius:50%;}
.table-el.square{border-radius:8px;}
.table-el.selected{outline:2px solid var(--green);outline-offset:3px;}
.table-num{font-family:var(--font-m);font-size:13px;font-weight:700;color:#fff;line-height:1;text-shadow:0 1px 3px rgba(0,0,0,0.5);}
.table-tag{font-family:var(--font-m);font-size:7px;color:rgba(255,255,255,0.7);margin-top:2px;letter-spacing:0.5px;text-transform:uppercase;}
.table-guests{font-family:var(--font-m);font-size:8px;color:rgba(255,255,255,0.85);margin-top:2px;}

/* ── PANEL ── */
#panel{width:210px;background:var(--surface);border-left:1px solid var(--border);padding:14px;overflow-y:auto;display:none;flex-shrink:0;}
#panel h4{font-family:var(--font-m);font-size:11px;color:var(--green);text-transform:uppercase;letter-spacing:1px;}
#panel label{display:block;font-family:var(--font-m);font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-top:12px;margin-bottom:5px;}
#panel input[type=text]{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--font-m);font-size:11px;padding:6px 8px;}
#panel input[type=text]:focus{outline:none;border-color:var(--green);}
#panel input[type=range]{width:100%;accent-color:var(--green);}
.color-palette{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;}
.color-chip{width:100%;aspect-ratio:1;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:transform 0.1s,border-color 0.1s;}
.color-chip:hover{transform:scale(1.12);}
.color-chip.selected{border-color:#fff;transform:scale(1.1);}
.shape-row{display:flex;gap:6px;}
.shape-opt{flex:1;padding:7px 4px;border:1px solid var(--border);border-radius:6px;font-family:var(--font-m);font-size:9px;text-align:center;cursor:pointer;color:var(--text-muted);background:var(--surface2);transition:all 0.15s;}
.shape-opt:hover{border-color:rgba(255,255,255,0.25);}
.shape-opt.active{border-color:var(--green);color:var(--green);background:rgba(180,79,255,0.1);}
#panel .close-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
#panel .close-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px;padding:0;}
#panel .del-btn{width:100%;margin-top:14px;padding:8px;font-family:var(--font-m);font-size:10px;border:1px solid rgba(224,82,82,0.4);border-radius:6px;color:var(--danger);background:transparent;cursor:pointer;transition:background 0.15s;}
#panel .del-btn:hover{background:rgba(224,82,82,0.15);}
#p-guests-wrap{display:none;}

/* ── MODALS ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:300;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;width:300px;max-height:80vh;overflow-y:auto;}
.modal-box h3{font-family:var(--font-m);font-size:12px;color:var(--green);text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;}
.layout-item{display:flex;align-items:center;justify-content:space-between;padding:10px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;transition:background 0.15s;}
.layout-item:hover{background:var(--surface2);}
.layout-item.current{border-color:var(--green);}
.layout-item-name{font-family:var(--font-m);font-size:11px;color:var(--text);flex:1;}
.layout-item-meta{font-family:var(--font-m);font-size:9px;color:var(--text-muted);margin-top:2px;}
.layout-item-btns{display:flex;gap:6px;}
.modal-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--font-m);font-size:11px;padding:8px 10px;margin-bottom:10px;}
.modal-input:focus{outline:none;border-color:var(--green);}
.modal-close{width:100%;margin-top:12px;padding:8px;font-family:var(--font-m);font-size:10px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--text-muted);cursor:pointer;}
.modal-close:hover{background:var(--surface2);}
.modal-confirm-btn{width:100%;padding:9px;font-family:var(--font-m);font-size:10px;border:none;border-radius:6px;background:var(--green);color:#000;font-weight:700;cursor:pointer;margin-bottom:6px;}
.modal-confirm-btn:hover{background:var(--green-dark);}

/* ── CANVAS SELECTOR ── */
#canvas-tab-bar{display:flex;gap:6px;padding:6px 12px;background:var(--surface2);border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center;flex-shrink:0;overflow-x:auto;}
.canvas-tab{font-family:var(--font-m);font-size:10px;padding:5px 12px;border:1px solid var(--border);border-radius:20px;cursor:pointer;color:var(--text-muted);background:transparent;white-space:nowrap;transition:all 0.15s;}
.canvas-tab:hover{border-color:rgba(255,255,255,0.3);color:var(--text);}
.canvas-tab.active{background:var(--green);color:#000;border-color:var(--green);font-weight:700;}
.canvas-tab-add{font-family:var(--font-m);font-size:13px;padding:2px 10px;border:1px dashed rgba(180,79,255,0.4);border-radius:20px;cursor:pointer;color:var(--green);background:transparent;}
.canvas-tab-add:hover{background:rgba(180,79,255,0.1);}

/* ── TOAST ── */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:#000;font-family:var(--font-m);font-size:11px;font-weight:700;padding:10px 20px;border-radius:20px;transition:transform 0.3s;z-index:500;pointer-events:none;white-space:nowrap;}
#toast.show{transform:translateX(-50%) translateY(0);}

#back-btn{font-family:var(--font-m);font-size:10px;background:none;border:none;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;gap:4px;}
#back-btn:hover{color:var(--text);}

@media(max-width:600px){
  #canvas-wrap{padding:8px;}
  #panel{width:100%;border-left:none;border-top:1px solid var(--border);max-height:260px;}
  #main{flex-direction:column;}
}


/* ── D-PAD ── */
#dpad{position:fixed;bottom:20px;right:16px;display:none;flex-direction:column;align-items:center;gap:4px;z-index:200;}
#dpad.visible{display:flex;}
.dp-row{display:flex;gap:4px;}
.dp-btn{width:52px;height:52px;background:rgba(180,79,255,0.25);border:1px solid rgba(180,79,255,0.5);border-radius:12px;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;user-select:none;-webkit-tap-highlight-color:transparent;}
.dp-btn:active{background:rgba(180,79,255,0.6);}
.dp-center{width:52px;height:52px;background:rgba(6,200,232,0.2);border:1px solid rgba(6,200,232,0.4);border-radius:50%;color:var(--cyan);font-size:11px;display:flex;align-items:center;justify-content:center;font-family:var(--font-m);cursor:pointer;touch-action:manipulation;user-select:none;}
.dp-center:active{background:rgba(6,200,232,0.4);}

/* ── BOTTOM SHEET (editor de mesa) ── */
#sheet-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:400;}
#sheet-overlay.open{display:block;}
#edit-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid rgba(180,79,255,0.4);border-radius:20px 20px 0 0;padding:16px 20px 32px;z-index:401;transform:translateY(100%);transition:transform 0.3s ease;max-height:85vh;overflow-y:auto;}
#edit-sheet.open{transform:translateY(0);}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
.sheet-title{font-family:var(--font-m);font-size:13px;color:var(--green);text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;}
.sheet-label{font-family:var(--font-m);font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;display:block;}
.sheet-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--font-m);font-size:18px;padding:12px 14px;margin-bottom:14px;outline:none;}
.sheet-input:focus{border-color:var(--green);}
.sheet-colors{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.sc-chip{width:42px;height:42px;border-radius:10px;border:3px solid transparent;cursor:pointer;transition:transform 0.1s,border-color 0.1s;touch-action:manipulation;}
.sc-chip.selected{border-color:#fff;transform:scale(1.15);}
.sheet-shapes{display:flex;gap:8px;margin-bottom:16px;}
.ss-opt{flex:1;padding:12px 6px;border:1px solid var(--border);border-radius:10px;font-family:var(--font-m);font-size:12px;text-align:center;cursor:pointer;color:var(--text-muted);background:var(--surface2);touch-action:manipulation;}
.ss-opt.active{border-color:var(--green);color:var(--green);background:rgba(180,79,255,0.15);}
.sheet-size-row{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.size-btn{width:44px;height:44px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;}
.size-btn:active{background:var(--surface3);}
#sheet-size-val{flex:1;text-align:center;font-family:var(--font-m);font-size:14px;color:var(--text);}
.sheet-del{width:100%;padding:14px;background:transparent;border:1px solid rgba(224,82,82,0.4);border-radius:10px;color:var(--danger);font-family:var(--font-m);font-size:12px;cursor:pointer;margin-top:6px;touch-action:manipulation;}
.sheet-del:active{background:rgba(224,82,82,0.15);}
.sheet-done{width:100%;padding:14px;background:var(--green);border:none;border-radius:10px;color:#000;font-family:var(--font-m);font-size:13px;font-weight:700;cursor:pointer;margin-bottom:8px;touch-action:manipulation;}

/* ── MOVE MODE ── */
.tb-btn.move-active{background:rgba(6,200,232,0.2);border-color:var(--cyan);color:var(--cyan);}

/* ── SNAP GRID (visual) ── */
#canvas.snap-grid{background-image:radial-gradient(circle,rgba(255,255,255,0.06) 1px,transparent 1px);background-size:20px 20px;}

/* Non-admin view mode */
.view-only-mode #toolbar .tb-btn:not(.view-allowed),
.view-only-mode #toolbar .tb-sep { display: none; }
.view-only-mode #toolbar::after { content: '👁 VIEW MODE'; font-family: var(--font-m); font-size: 9px; color: var(--green); letter-spacing: 1px; padding: 0 8px; }
</style>
</head>
<body>

<!-- LOCK SCREEN (si no es admin) -->
<div id="lockScreen">
  <div class="lock-icon">🔐</div>
  <div class="lock-logo">HÅNDSLAG</div>
  <div class="lock-msg">Verificando acceso...<br><span id="lock-sub" style="color:var(--danger);display:none">Solo administradores pueden acceder al editor de mapas.</span></div>
  <button class="tb-btn" id="lock-back-btn" style="display:none" onclick="goBack()">← Volver</button>
</div>

<div id="appWrap" style="display:none;flex-direction:column;height:100vh;flex:1;">

  <!-- HEADER -->
  <div id="header">
    <button id="back-btn" onclick="goBack()">← BACK</button>
    <span class="logo">Håndslag</span>
    <span class="page-title" id="map-page-title">/ map</span>
    <div class="spacer"></div>
    <span id="admin-badge">ADMIN</span>
    <span id="view-mode-badge" style="display:none;font-family:var(--font-m);font-size:9px;color:var(--text-muted)"></span>
    <div class="sync-dot" id="sync-dot"></div>
  </div>

  <!-- TABS DE MAPAS -->
  <div id="canvas-tab-bar"></div>

  <!-- TOOLBAR -->
  <div id="toolbar">
    <button class="tb-btn primary" id="btn-add-table" onclick="addTable()">+ Mesa</button>
    <button class="tb-btn" id="btn-move-mode" onclick="toggleMoveMode()">✋ Mover</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" id="btn-design" onclick="setMode('design')">✏️ Design</button>
    <button class="tb-btn" id="btn-event" onclick="setMode('event')">👥 Event</button>
    <div class="tb-sep"></div>
    <select id="layout-select" onchange="loadLayoutByName(this.value)">
      <option value="">— layouts —</option>
    </select>
    <button class="tb-btn" id="btn-save" onclick="saveLayout()">💾 Save</button>
    <button class="tb-btn" id="btn-all-layouts" onclick="openLayoutsModal()">📋 All</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" id="btn-zoom-out" onclick="adjustZoom(-0.1)" title="Zoom out">−</button>
    <span id="zoom-label" style="font-family:var(--font-m);font-size:10px;color:var(--text-muted);min-width:32px;text-align:center">100%</span>
    <button class="tb-btn" id="btn-zoom-in" onclick="adjustZoom(0.1)" title="Zoom in">+</button>
    <button class="tb-btn" id="btn-zoom-fit" onclick="fitCanvas(true)" title="Fit to screen">⊡ Fit</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" onclick="showPresetMenu()">📐 Presets</button>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="canvas-wrap">
      <div id="canvas-outer"><div id="canvas"></div></div>
    </div>

    <!-- PANEL EDICIÓN (solo admin) -->
    <div id="panel">
      <div class="close-row">
        <h4 id="panel-title">Edit Table</h4>
        <button class="close-btn" id="btn-close-panel" onclick="closePanel()">✕</button>
      </div>
      <label id="lbl-numname">Number / Name</label>
      <input type="text" id="p-name" oninput="updateSel('name', this.value)" placeholder="Ej: 5, VIP1..."/>
      <label id="lbl-zone">Zone</label>
      <input type="text" id="p-sub" oninput="updateSel('sub', this.value)" placeholder="Ej: Kaffe, Dancefloor..."/>
      <label id="lbl-color">Color</label>
      <div class="color-palette" id="color-palette"></div>
      <label>Forma</label>
      <div class="shape-row">
        <div class="shape-opt" id="sh-round" onclick="updateSel('shape','round')">⬤ Redonda</div>
        <div class="shape-opt" id="sh-square" onclick="updateSel('shape','square')">◼ Cuadrada</div>
      </div>
      <label id="lbl-size">Size</label>
      <input type="range" min="40" max="110" step="1" id="p-size" oninput="updateSel('size', +this.value)"/>
      <div id="p-guests-wrap">
        <label id="lbl-guests">Guests</label>
        <input type="text" id="p-guests" oninput="updateSel('guests', this.value)" placeholder="Separados por coma"/>
      </div>
      <button class="del-btn" onclick="deleteSelected()" id="btn-delete-table">🗑 Delete Table</button>
    </div>
  </div>

<!-- D-PAD (directional arrows when table selected) -->
<div id="dpad">
  <div class="dp-row"><button class="dp-btn" onpointerdown="startNudge(0,-1)" onpointerup="stopNudge()" onpointerleave="stopNudge()">↑</button></div>
  <div class="dp-row">
    <button class="dp-btn" onpointerdown="startNudge(-1,0)" onpointerup="stopNudge()" onpointerleave="stopNudge()">←</button>
    <button class="dp-center" onclick="openEditSheet()">✏️</button>
    <button class="dp-btn" onpointerdown="startNudge(1,0)" onpointerup="stopNudge()" onpointerleave="stopNudge()">→</button>
  </div>
  <div class="dp-row"><button class="dp-btn" onpointerdown="startNudge(0,1)" onpointerup="stopNudge()" onpointerleave="stopNudge()">↓</button></div>
</div>

<!-- BOTTOM SHEET editor -->
<div id="sheet-overlay" onclick="closeEditSheet()"></div>
<div id="edit-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="sheet-title">Editar mesa</div>
  <span class="sheet-label">Número / Nombre</span>
  <input class="sheet-input" id="sh-name" type="text" inputmode="text" placeholder="Ej: 5, VIP..." oninput="updateSel('name',this.value)"/>
  <span class="sheet-label">Color</span>
  <div class="sheet-colors" id="sheet-colors"></div>
  <span class="sheet-label">Forma</span>
  <div class="sheet-shapes">
    <div class="ss-opt" id="ss-round" onclick="updateSel('shape','round');syncSheetShape('round')">⬤ Redonda</div>
    <div class="ss-opt" id="ss-square" onclick="updateSel('shape','square');syncSheetShape('square')">◼ Cuadrada</div>
  </div>
  <span class="sheet-label">Tamaño</span>
  <div class="sheet-size-row">
    <button class="size-btn" onclick="changeSize(-10)">−</button>
    <span id="sheet-size-val">80px</span>
    <button class="size-btn" onclick="changeSize(10)">+</button>
  </div>
  <button class="sheet-done" onclick="closeEditSheet()">✓ Listo</button>

  const savedUser = localStorage.getItem('hs_loggedUsername');
  if (!user && savedUser) {
    // Intentar leer de Firebase
    db.ref('users').once('value').then(snap => {
      const usersData = snap.val() || {};
      const found = Object.values(usersData).find(u => u.username === savedUser);
      if (found) {
        grantAccess(found);
      } else {
        denyAccess();

  if (user) {

  }

// ─── CANVAS SIZE ───
function getCanvasSize() { return { w: 760, h: 500 }; }

let canvasScale = 1;
function fitCanvas(manual=false) {
  const wrap = document.getElementById('canvas-wrap');
  const outer = document.getElementById('canvas-outer');
  const {w, h} = getCanvasSize();
  const availW = wrap.clientWidth - 24;
  const availH = wrap.clientHeight - 24;
  const s = Math.min(1, Math.min(availW / w, availH / h));
  canvasScale = manual ? s : Math.min(canvasScale || s, s > 0.95 ? 1 : s);
  if (manual) canvasScale = s;
  applyZoom();
}
function applyZoom() {
  const outer = document.getElementById('canvas-outer');
  if (!outer) return;
  outer.style.transform = 'scale(' + canvasScale + ')';
  const {w, h} = getCanvasSize();
  // Make the wrap scrollable with correct scroll dimensions
  outer.style.width = w + 'px';
  outer.style.height = h + 'px';
  const lbl = document.getElementById('zoom-label');
  if (lbl) lbl.textContent = Math.round(canvasScale * 100) + '%';
}
function adjustZoom(delta) {
  canvasScale = Math.max(0.3, Math.min(2, canvasScale + delta));
  applyZoom();
}

// ─── RENDER MAP TABS ───
function renderMapTabs() {
  const bar = document.getElementById('canvas-tab-bar');
  const mapIds = Object.keys(maps);
  bar.innerHTML = '';
  mapIds.forEach(id => {
    const m = maps[id];
    const tab = document.createElement('button');
    tab.className = 'canvas-tab' + (id === currentMapId ? ' active' : '');
    tab.textContent = m.name || 'Mapa';
    tab.onclick = () => switchMap(id);

    if (isAdmin) {
      tab.oncontextmenu = (e) => { e.preventDefault(); promptRenameMap(id); };
    }
    bar.appendChild(tab);
  });

  if (isAdmin) {
    const addBtn = document.createElement('button');
    addBtn.className = 'canvas-tab-add';
    addBtn.textContent = '+';
    addBtn.title = 'Nuevo mapa';
    addBtn.onclick = () => openModal('modal-new-map');
    bar.appendChild(addBtn);
  }
}

  // Guardar el mapa actual antes de cambiar
  if (currentMapId && maps[currentMapId]) {
    maps[currentMapId].tables = tables.map(t=>({...t}));
    db.ref('mapa_v2/' + currentMapId + '/tables').set(tables.map(t=>({...t})));
  }
  currentMapId = id;
  tables = (maps[id].tables || []).map(t=>({...t}));
  selected = null;
  document.getElementById('panel').style.display = 'none';
  renderMapTabs();
  render();
}

  const newMap = { name: finalName, tables: DEFAULT_TABLES.map(t=>({...t})) };

  renderMapTabs();
  buildSheetColors();
  setTimeout(() => { fitCanvas(true); }, 100);
  window.addEventListener('resize', () => fitCanvas(false));
}

// ─── RENDER CANVAS ───
function render() {
  const canvas = document.getElementById('canvas');
  const {w, h} = getCanvasSize();
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  canvas.innerHTML = '';

  // Zonas de fondo (sin etiquetas)
  const ZONES = [
    {x:10,y:8,w:740,h:130,color:'rgba(180,79,255,0.06)'},
    {x:8,y:310,w:155,h:182,color:'rgba(255,255,255,0.03)'},
    {x:600,y:185,w:155,h:308,color:'rgba(255,255,255,0.03)'},
    {x:530,y:355,w:225,h:145,color:'rgba(180,79,255,0.05)'},
  ];
  ZONES.forEach(z => {
    const d = document.createElement('div');
    d.className = 'zone';
    d.style.cssText = `left:${z.x}px;top:${z.y}px;width:${z.w}px;height:${z.h}px;background:${z.color};`;
    canvas.appendChild(d);
  });

  // Barras
  [
    {css:'left:175px;top:148px;width:430px;height:38px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);', txt:'BACK BAR'},
    {css:'left:175px;top:195px;width:430px;height:8px;background:rgba(180,79,255,0.3);border-radius:2px;',txt:''},
    {css:'left:175px;top:212px;width:430px;height:78px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);',txt:'MAIN BAR'},
  ].forEach(b => {
    const el = document.createElement('div');
    el.className='bar-el'; el.style.cssText=b.css; el.textContent=b.txt;
    canvas.appendChild(el);
  });

  // Mesas
  tables.forEach(t => {
    const el = document.createElement('div');
    el.className = `table-el ${t.shape}`;
    if (isAdmin && mode === 'design') el.classList.add('draggable');
    el.dataset.id = t.id;
    el.style.cssText = `left:${t.x}px;top:${t.y}px;width:${t.size}px;height:${t.size}px;background:${t.color};`;
    if (t === selected) el.classList.add('selected');

    const num = document.createElement('div');
    num.className='table-num'; num.textContent=t.name;
    el.appendChild(num);
    if (t.sub) {
      const sub = document.createElement('div');
      sub.className='table-tag'; sub.textContent=t.sub;
      el.appendChild(sub);
    }
    if (mode==='event' && t.guests) {
      const gst = document.createElement('div');
      gst.className='table-guests';
      gst.textContent='👥'+t.guests.split(',').filter(x=>x.trim()).length;
      el.appendChild(gst);
    }

    if (isAdmin && mode==='design') {
      el.addEventListener('mousedown', startDrag);
      el.addEventListener('touchstart', startDragTouch, {passive:false});
    }
    el.addEventListener('click', e => { e.stopPropagation(); if(isAdmin) selectTable(t); });
    el.addEventListener('dblclick', e => { e.stopPropagation(); if(isAdmin) { selectTable(t); openEditSheet(); } });
    canvas.appendChild(el);
  });
}

// ─── DRAG (solo admin) ───
function startDrag(e) {
  e.preventDefault();
  dragging = tables.find(x=>x.id===+e.currentTarget.dataset.id);
  const r = document.getElementById('canvas').getBoundingClientRect();
  dragOffX = (e.clientX-r.left)/canvasScale - dragging.x;
  dragOffY = (e.clientY-r.top)/canvasScale - dragging.y;
  document.addEventListener('mousemove', onDrag);
  document.addEventListener('mouseup', stopDrag);
}
function startDragTouch(e) {
  e.preventDefault();
  const touch = e.touches[0];
  dragging = tables.find(x=>x.id===+e.currentTarget.dataset.id);
  const r = document.getElementById('canvas').getBoundingClientRect();
  dragOffX = (touch.clientX-r.left)/canvasScale - dragging.x;
  dragOffY = (touch.clientY-r.top)/canvasScale - dragging.y;
  document.addEventListener('touchmove', onDragTouch, {passive:false});
  document.addEventListener('touchend', stopDrag);
}
function onDrag(e) {
  if(!dragging) return;
  const {w,h} = getCanvasSize();
  const r = document.getElementById('canvas').getBoundingClientRect();
  dragging.x = snapVal(Math.max(0,Math.min(w-dragging.size, (e.clientX-r.left)/canvasScale - dragOffX)));
  dragging.y = snapVal(Math.max(0,Math.min(h-dragging.size, (e.clientY-r.top)/canvasScale - dragOffY)));
  render();
}
function onDragTouch(e) {
  if(!dragging) return; e.preventDefault();
  const t=e.touches[0]; const {w,h}=getCanvasSize();
  const r=document.getElementById('canvas').getBoundingClientRect();
  dragging.x=snapVal(Math.max(0,Math.min(w-dragging.size,(t.clientX-r.left)/canvasScale-dragOffX)));
  dragging.y=snapVal(Math.max(0,Math.min(h-dragging.size,(t.clientY-r.top)/canvasScale-dragOffY)));
  render();
}
function stopDrag() {
  if(dragging && currentMapId) {
    db.ref('mapa_v2/'+currentMapId+'/tables').set(tables.map(t=>({...t})));
  }
  dragging=null;
  document.removeEventListener('mousemove',onDrag);
  document.removeEventListener('mouseup',stopDrag);
  document.removeEventListener('touchmove',onDragTouch);
  document.removeEventListener('touchend',stopDrag);
}

// ─── PANEL (solo admin) ───
function selectTable(t) {
  if(!isAdmin) return;
  selected=t;
  showDpad();
  render();
}
function closePanel() {
  selected=null;
  hideDpad();
  render();
}
function updateSel(key,val) {
  if(!selected||!isAdmin) return;
  selected[key]=val;
  if(key==='shape'){
    document.getElementById('sh-round').className='shape-opt'+(val==='round'?' active':'');
    document.getElementById('sh-square').className='shape-opt'+(val==='square'?' active':'');
  }
  if(key==='color') syncPaletteColor(val);
  // Autosave al Firebase
  if(currentMapId) db.ref('mapa_v2/'+currentMapId+'/tables').set(tables.map(t=>({...t})));
  render();
}
function deleteSelected() {
  if(!selected||!isAdmin||!confirm('¿Eliminar mesa '+selected.name+'?')) return;
  tables=tables.filter(t=>t!==selected);
  selected=null;
  document.getElementById('panel').style.display='none';
  if(currentMapId) db.ref('mapa_v2/'+currentMapId+'/tables').set(tables.map(t=>({...t})));
  render();
}

// ─── PALETA ───
function buildPalette() {
  const c=document.getElementById('color-palette');
  c.innerHTML='';
  PALETTE.forEach(hex=>{
    const chip=document.createElement('div');
    chip.className='color-chip'; chip.style.background=hex; chip.dataset.color=hex;
    chip.onclick=()=>{ updateSel('color',hex); syncPaletteColor(hex); };
    c.appendChild(chip);
  });
}
function syncPaletteColor(color) {
  document.querySelectorAll('.color-chip').forEach(c=>c.classList.toggle('selected',c.dataset.color===color));
}

// ─── AÑADIR MESA ───
function addTable() {
  if(!isAdmin) return;
  const t={id:nextId++,name:String(tables.length+1),sub:'',x:snapVal(Math.random()*600+40),y:snapVal(Math.random()*340+40),color:'#b44fff',shape:'round',size:80,guests:''};
  tables.push(t);
  if(currentMapId) db.ref('mapa_v2/'+currentMapId+'/tables').set(tables.map(t=>({...t})));
  selectTable(t); render();
}

// ─── MODO ───
function setMode(m) {
  mode=m;
  document.getElementById('btn-design').className='tb-btn'+(m==='design'?' active':'');
  document.getElementById('btn-event').className='tb-btn'+(m==='event'?' active':'');
  // En modo evento, el editor de panel sigue visible para admin pero oculta drag
  if(selected) document.getElementById('p-guests-wrap').style.display=m==='event'?'block':'none';
  render();
}

// ─── LAYOUTS ───
function saveLayout() {
  if(!isAdmin) return;
  const name=prompt('Nombre del layout:',currentLayoutName);
  if(!name) return;
  currentLayoutName=name;
  const data=tables.map(t=>({...t}));
  layouts[name]=data;
  db.ref('mapa_layouts/'+name).set(data)
    .then(()=>toast('Layout "'+name+'" guardado ✓'))
    .catch(()=>toast('Error al guardar'));
  renderLayoutSelect();
}
function loadLayoutByName(name) {
  if(!name||!layouts[name]) return;
  currentLayoutName=name;
  tables=layouts[name].map(t=>({...t}));
  selected=null; document.getElementById('panel').style.display='none';
  render();
}
function renderLayoutSelect() {
  const sel=document.getElementById('layout-select');
  const names=Object.keys(layouts);
  sel.innerHTML='<option value="">— layouts —</option>'+names.map(n=>`<option value="${n}"${n===currentLayoutName?' selected':''}>${n}</option>`).join('');
}
function openLayoutsModal(){ renderLayoutsList(); openModal('modal-layouts'); }
function renderLayoutsList(){
  const list=document.getElementById('layouts-list');
  const names=Object.keys(layouts);
  list.innerHTML=names.length?names.map(n=>`
    <div class="layout-item${n===currentLayoutName?' current':''}">
      <span class="layout-item-name">${n}</span>
      <div class="layout-item-btns">
        <button class="tb-btn" onclick="loadLayoutByName('${n}');closeModal('modal-layouts')">▶</button>
        ${isAdmin?`<button class="tb-btn danger" onclick="deleteLayout('${n}')">🗑</button>`:''}
      </div></div>`).join('')
    :`<p style="font-family:var(--font-m);font-size:11px;color:var(--text-muted)">${(MAPA_T[getLang()]||MAPA_T.en).noLayouts}</p>`;
}
function deleteLayout(name){
  if(!confirm('¿Eliminar layout "'+name+'"?')) return;
  delete layouts[name];
  db.ref('mapa_layouts/'+name).remove().then(()=>{toast('"'+name+'" eliminado');renderLayoutsList();});
  renderLayoutSelect();
}

// ─── MODALS ───
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(m=>{
  m.addEventListener('click',e=>{ if(e.target===m) m.classList.remove('open'); });
});

// ─── TOAST ───
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}

// ─── BACK ───
function goBack(){
  // Works both locally and on GitHub Pages subdirectory
  const base = window.location.href.replace(/mapa\.html.*$/, '');
  window.location.href = base + 'index.html';
}

document.getElementById('canvas').addEventListener('click',function(e){
  if(e.target===this){ selected=null; hideDpad(); render(); }
});

// ─── ARRANCAR ───
// Guardar usuario al iniciar sesión (añadir esto en index.html)
// sessionStorage.setItem('hs_currentUser', JSON.stringify(currentUser));
applyMapLang();
checkAuth();
</script>
