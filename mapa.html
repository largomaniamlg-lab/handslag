<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Håndslag — Mapa</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#06061a;--surface:#0e0c24;--surface2:#14122e;
  --accent:#b44fff;--cyan:#06c8e8;--border:rgba(255,255,255,0.1);
  --text:#f0f0f0;--muted:#888;--danger:#e05252;
  --font:'Barlow Condensed',sans-serif;--mono:'Space Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;}
#lock{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.lock-logo{font-size:28px;font-weight:700;letter-spacing:2px;background:linear-gradient(135deg,#b44fff,#06c8e8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
#app{display:none;flex-direction:column;height:100vh;}
#hdr{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);height:50px;flex-shrink:0;}
.logo{font-size:18px;font-weight:700;background:linear-gradient(135deg,#b44fff,#06c8e8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.spacer{flex:1;}
#sync-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);}
#sync-dot.off{background:var(--muted);}
.hbtn{background:none;border:none;color:var(--muted);font-family:var(--mono);font-size:10px;cursor:pointer;padding:4px 8px;}
#modebar{display:flex;padding:8px 12px;gap:8px;background:var(--surface2);border-bottom:1px solid var(--border);align-items:center;flex-shrink:0;}
.mbtn{flex:1;padding:10px;border:1px solid var(--border);border-radius:10px;background:var(--surface);color:var(--muted);font-family:var(--mono);font-size:11px;cursor:pointer;text-align:center;touch-action:manipulation;}
.mbtn.active{background:rgba(180,79,255,0.2);border-color:var(--accent);color:var(--accent);font-weight:700;}
.mbtn.active-edit{background:rgba(6,200,232,0.15);border-color:var(--cyan);color:var(--cyan);font-weight:700;}
#hint{font-family:var(--mono);font-size:9px;color:var(--muted);text-align:center;flex:2;line-height:1.4;}
#wrap{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:10px;}
#canvas-outer{transform-origin:center center;}
#canvas{position:relative;background:#0d0b22;border-radius:12px;border:1px solid rgba(255,255,255,0.12);overflow:hidden;}

/* Zones */
.zone-bg{position:absolute;border-radius:8px;pointer-events:none;}
.zone-label{position:absolute;font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;pointer-events:none;font-weight:700;}
.bar-shape{position:absolute;border-radius:6px;pointer-events:none;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9px;letter-spacing:0.5px;text-transform:uppercase;}
.door-marker{position:absolute;font-family:var(--mono);font-size:8px;letter-spacing:0.5px;color:rgba(255,255,255,0.5);pointer-events:none;display:flex;align-items:center;gap:3px;}

/* Tables */
.tbl{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation;user-select:none;-webkit-tap-highlight-color:transparent;transition:transform 0.12s,box-shadow 0.12s;}
.tbl:active{transform:scale(0.95);}
.tbl.round{border-radius:50%;}
.tbl.square{border-radius:8px;}
.tbl.selected{box-shadow:0 0 0 3px #fff,0 0 16px rgba(255,255,255,0.25);transform:scale(1.06);}
.tbl-num{font-family:var(--mono);font-weight:700;color:#fff;line-height:1;text-shadow:0 1px 4px rgba(0,0,0,0.7);}
.tbl-sub{font-family:var(--mono);color:rgba(255,255,255,0.65);line-height:1;margin-top:2px;}

/* Info sheet */
#info-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:300;}
#info-overlay.open{display:block;}
#info-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:2px solid var(--accent);border-radius:20px 20px 0 0;padding:20px 20px 36px;z-index:301;transform:translateY(100%);transition:transform 0.3s ease;}
#info-sheet.open{transform:translateY(0);}
.sh-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px;}
.sh-name{font-size:44px;font-weight:700;color:var(--accent);font-family:var(--font);line-height:1;}
.sh-sub{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:4px 0 14px;}
.sh-close{position:absolute;top:20px;right:20px;background:var(--surface2);border:none;color:var(--muted);width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;}

/* Edit sheet */
#edit-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:400;}
#edit-overlay.open{display:block;}
#edit-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:2px solid var(--cyan);border-radius:20px 20px 0 0;padding:20px 20px 40px;z-index:401;transform:translateY(100%);transition:transform 0.3s ease;max-height:88vh;overflow-y:auto;}
#edit-sheet.open{transform:translateY(0);}
.es-lbl{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin:14px 0 6px;display:block;}
.es-inp{width:100%;background:var(--surface2);border:2px solid var(--border);border-radius:12px;color:var(--text);font-family:var(--mono);font-size:22px;padding:14px;outline:none;}
.es-inp:focus{border-color:var(--cyan);}
.cc-row{display:flex;gap:8px;flex-wrap:wrap;}
.cc{width:44px;height:44px;border-radius:10px;border:3px solid transparent;cursor:pointer;touch-action:manipulation;}
.cc.on{border-color:#fff;transform:scale(1.12);}
.shape-row{display:flex;gap:8px;}
.sopt{flex:1;padding:13px;border:2px solid var(--border);border-radius:12px;font-family:var(--mono);font-size:12px;text-align:center;cursor:pointer;color:var(--muted);background:var(--surface2);touch-action:manipulation;}
.sopt.on{border-color:var(--cyan);color:var(--cyan);background:rgba(6,200,232,0.1);}
.sz-row{display:flex;align-items:center;gap:12px;}
.sz-btn{width:52px;height:52px;background:var(--surface2);border:2px solid var(--border);border-radius:12px;color:var(--text);font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;}
#sz-val{flex:1;text-align:center;font-family:var(--mono);font-size:16px;}
.btn-done{width:100%;padding:16px;background:linear-gradient(135deg,#b44fff,#06c8e8);border:none;border-radius:12px;color:#000;font-family:var(--mono);font-size:13px;font-weight:700;cursor:pointer;margin-top:18px;touch-action:manipulation;}
.btn-del{width:100%;padding:13px;background:transparent;border:2px solid rgba(224,82,82,0.4);border-radius:12px;color:var(--danger);font-family:var(--mono);font-size:12px;cursor:pointer;margin-top:8px;touch-action:manipulation;}
#add-btn{position:fixed;bottom:24px;right:18px;width:58px;height:58px;background:linear-gradient(135deg,#b44fff,#06c8e8);border:none;border-radius:50%;color:#000;font-size:28px;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(180,79,255,0.4);z-index:100;touch-action:manipulation;}
#add-btn.show{display:flex;}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--accent);color:#000;font-family:var(--mono);font-size:11px;font-weight:700;padding:10px 20px;border-radius:20px;transition:transform 0.3s;z-index:600;pointer-events:none;white-space:nowrap;}
#toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="lock">
  <div style="font-size:40px">🔐</div>
  <div class="lock-logo">HÅNDSLAG</div>
  <div style="font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center" id="lock-msg">Verificando acceso...</div>
  <button style="display:none;font-family:var(--mono);font-size:11px;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:8px;cursor:pointer" id="lock-back" onclick="goBack()">← Volver</button>
</div>
<div id="app">
  <div id="hdr">
    <button class="hbtn" onclick="goBack()">← Volver</button>
    <span class="logo">Håndslag</span>
    <div class="spacer"></div>
    <div id="sync-dot"></div>
  </div>
  <div id="modebar">
    <button class="mbtn active" id="btn-view" onclick="setMode('view')">👁 Ver</button>
    <span id="hint">Toca una mesa</span>
    <button class="mbtn" id="btn-edit" onclick="setMode('edit')" style="display:none">✏️ Editar</button>
  </div>
  <div id="wrap"><div id="canvas-outer"><div id="canvas"></div></div></div>
</div>

<!-- INFO SHEET -->
<div id="info-overlay" onclick="closeInfo()"></div>
<div id="info-sheet">
  <button class="sh-close" onclick="closeInfo()">✕</button>
  <div class="sh-handle"></div>
  <div class="sh-name" id="info-name"></div>
  <div class="sh-sub" id="info-sub"></div>
  <div style="margin-top:14px;font-family:var(--mono);font-size:12px;color:var(--text);line-height:2" id="info-guests"></div>
</div>

<!-- EDIT SHEET -->
<div id="edit-overlay" onclick="closeEdit()"></div>
<div id="edit-sheet">
  <div class="sh-handle"></div>
  <span class="es-lbl">Número / Nombre</span>
  <input class="es-inp" id="es-name" type="text" inputmode="text" placeholder="Ej: 5, VIP1..."/>
  <span class="es-lbl">Zona / Descripción</span>
  <input class="es-inp" id="es-sub" type="text" inputmode="text" placeholder="Ej: Kaffe, VIP..." style="font-size:16px;padding:10px 14px;"/>
  <span class="es-lbl">Color</span>
  <div class="cc-row" id="es-colors"></div>
  <span class="es-lbl">Forma</span>
  <div class="shape-row">
    <div class="sopt" id="sopt-round" onclick="setShape('round')">⬤ Redonda</div>
    <div class="sopt" id="sopt-square" onclick="setShape('square')">◼ Cuadrada</div>
  </div>
  <span class="es-lbl">Tamaño</span>
  <div class="sz-row">
    <button class="sz-btn" onclick="changeSize(-10)">−</button>
    <span id="sz-val">80px</span>
    <button class="sz-btn" onclick="changeSize(+10)">+</button>
  </div>
  <button class="btn-done" onclick="closeEdit()">✓ Guardar</button>
  <button class="btn-del" onclick="deleteSel()">🗑 Eliminar mesa</button>
</div>

<button id="add-btn" onclick="addTable()">+</button>
<div id="toast"></div>

<script>
const FB_CFG={apiKey:"AIzaSyC4c-4MXb9lrVMiHWn_0tE6PKIOU_lScRs",authDomain:"handslag-fdd42.firebaseapp.com",databaseURL:"https://handslag-fdd42-default-rtdb.europe-west1.firebasedatabase.app",projectId:"handslag-fdd42",storageBucket:"handslag-fdd42.appspot.com",messagingSenderId:"1090291987706",appId:"1:1090291987706:web:0effe68dc7e7faa1ef06cd"};
firebase.initializeApp(FB_CFG);
const db=firebase.database();

// Canvas dimensions
const CW=800, CH=560;

const PALETTE=['#b44fff','#06c8e8','#2ecc71','#3498db','#e74c3c','#e67e22','#f1c40f','#e91e8c','#795548','#37474f','#607d8b','#1abc9c'];

// Venue zones
const ZONES=[
  {x:175,y:0,w:625,h:112,color:'rgba(96,125,139,0.18)',label:'KAFFE',lx:185,ly:6,lcolor:'rgba(150,200,220,0.5)'},
  {x:155,y:115,w:355,h:295,color:'rgba(255,255,255,0.03)',label:'MAIN BAR',lx:160,ly:120,lcolor:'rgba(255,255,255,0.2)'},
  {x:295,y:248,w:175,h:140,color:'rgba(255,255,255,0.04)',label:'BACK BAR',lx:300,ly:253,lcolor:'rgba(255,255,255,0.25)'},
  {x:612,y:115,w:165,h:310,color:'rgba(180,79,255,0.08)',label:'',lx:0,ly:0,lcolor:''},
  {x:10,y:418,w:165,h:130,color:'rgba(180,79,255,0.12)',label:'DANCEFLOOR',lx:15,ly:423,lcolor:'rgba(180,79,255,0.6)'},
];

// Default venue layout (matches the hand-drawn plan)
const DEFAULT_TABLES=[
  // KAFFE zone (top)
  {id:3, name:'3',sub:'Kaffe',x:232,y:20,color:'#607d8b',shape:'square',size:72},
  {id:2, name:'2',sub:'Kaffe',x:382,y:20,color:'#607d8b',shape:'square',size:72},
  {id:1, name:'1',sub:'Kaffe',x:532,y:20,color:'#607d8b',shape:'square',size:72},
  // Left column (4-8)
  {id:4, name:'4',sub:'',x:20,y:118,color:'#3498db',shape:'square',size:68},
  {id:5, name:'5',sub:'',x:20,y:198,color:'#3498db',shape:'square',size:68},
  {id:6, name:'6',sub:'',x:20,y:278,color:'#3498db',shape:'square',size:68},
  {id:7, name:'7',sub:'',x:20,y:348,color:'#3498db',shape:'square',size:68},
  {id:8, name:'8',sub:'',x:20,y:420,color:'#3498db',shape:'square',size:68},
  // Right column in box (16-19)
  {id:16,name:'16',sub:'',x:622,y:118,color:'#b44fff',shape:'round',size:70},
  {id:17,name:'17',sub:'',x:622,y:198,color:'#b44fff',shape:'round',size:70},
  {id:18,name:'18',sub:'',x:622,y:278,color:'#b44fff',shape:'round',size:70},
  {id:19,name:'19',sub:'',x:622,y:358,color:'#b44fff',shape:'round',size:70},
  // Dancefloor area
  {id:9, name:'9',sub:'Dancefloor',x:22,y:470,color:'#e91e8c',shape:'square',size:65},
  // Bottom row
  {id:10,name:'10',sub:'',x:200,y:462,color:'#2ecc71',shape:'square',size:68},
  {id:11,name:'11',sub:'',x:308,y:462,color:'#2ecc71',shape:'round',size:65},
  {id:12,name:'12',sub:'',x:388,y:462,color:'#2ecc71',shape:'round',size:65},
  {id:13,name:'13',sub:'',x:468,y:462,color:'#2ecc71',shape:'round',size:65},
  {id:14,name:'14',sub:'',x:560,y:462,color:'#2ecc71',shape:'round',size:65},
  {id:15,name:'15',sub:'',x:640,y:462,color:'#2ecc71',shape:'round',size:65},
];

let tables=[], selected=null, mode='view', isAdmin=false, canvasScale=1, nextId=100;

// AUTH
function checkAuth(){
  let user=null;
  try{user=JSON.parse(sessionStorage.getItem('hs_currentUser'));}catch(e){}
  if(!user){try{user=JSON.parse(localStorage.getItem('hs_currentUser'));}catch(e){}}
  if(!user){
    const uname=sessionStorage.getItem('hs_loggedUsername')||localStorage.getItem('hs_loggedUsername');
    if(uname){db.ref('users').once('value',s=>{const all=s.val()||{};const f=Object.values(all).find(u=>u.username===uname);f?grantAccess(f):denyAccess();});return;}
    denyAccess();return;
  }
  grantAccess(user);
}
function grantAccess(user){
  isAdmin=(user.role==='admin');
  document.getElementById('lock').style.display='none';
  document.getElementById('app').style.display='flex';
  if(isAdmin)document.getElementById('btn-edit').style.display='block';
  initMap();
}
function denyAccess(){
  document.getElementById('lock-msg').innerHTML='Sin sesión activa.<br>Abre desde la app Håndslag.';
  document.getElementById('lock-back').style.display='block';
}
function goBack(){window.location.href=window.location.href.replace(/mapa\.html.*$/,'')+'index.html';}

// INIT
function initMap(){
  fitCanvas();
  window.addEventListener('resize',fitCanvas);
  buildEditColors();
  db.ref('.info/connected').on('value',s=>{document.getElementById('sync-dot').className=s.val()?'':'off';});
  db.ref('mapa_v2/main/tables').on('value',snap=>{
    const raw=snap.val();
    if(raw){tables=(Array.isArray(raw)?raw:Object.values(raw)).filter(Boolean);nextId=Math.max(nextId,...tables.map(t=>t.id||0))+1;}
    else{tables=DEFAULT_TABLES.map(t=>({...t}));saveTables();}
    render();
  });
}
function saveTables(){db.ref('mapa_v2/main/tables').set(tables.map(t=>({...t})));}

function fitCanvas(){
  const wrap=document.getElementById('wrap');
  const s=Math.min((wrap.clientWidth-20)/CW,(wrap.clientHeight-20)/CH,1);
  canvasScale=s;
  const o=document.getElementById('canvas-outer');
  o.style.transform=`scale(${s})`;
  o.style.width=CW+'px'; o.style.height=CH+'px';
  document.getElementById('canvas').style.width=CW+'px';
  document.getElementById('canvas').style.height=CH+'px';
}

// RENDER
function render(){
  const canvas=document.getElementById('canvas');
  canvas.innerHTML='';

  // Zones
  ZONES.forEach(z=>{
    const d=document.createElement('div');
    d.className='zone-bg';
    d.style.cssText=`left:${z.x}px;top:${z.y}px;width:${z.w}px;height:${z.h}px;background:${z.color};border:1px solid rgba(255,255,255,0.07);`;
    canvas.appendChild(d);
    if(z.label){
      const l=document.createElement('div');
      l.className='zone-label';
      l.style.cssText=`left:${z.lx}px;top:${z.ly}px;color:${z.lcolor};`;
      l.textContent=z.label;
      canvas.appendChild(l);
    }
  });

  // Bar shapes
  [{x:157,y:117,w:351,h:126,color:'rgba(255,255,255,0.05)',label:'MAIN BAR'},
   {x:297,y:250,w:171,h:136,color:'rgba(255,255,255,0.07)',label:'BACK BAR'},
  ].forEach(b=>{
    const d=document.createElement('div');
    d.className='bar-shape';
    d.style.cssText=`left:${b.x}px;top:${b.y}px;width:${b.w}px;height:${b.h}px;background:${b.color};border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.3);`;
    d.textContent=b.label;
    canvas.appendChild(d);
  });

  // Entrance marker (top-left)
  const ent=document.createElement('div');
  ent.className='door-marker';
  ent.style.cssText='left:6px;top:6px;flex-direction:column;gap:2px;';
  ent.innerHTML='<span style="font-size:14px">🚪</span><span>ENTRANCE</span>';
  canvas.appendChild(ent);

  // Backyard exit marker (bottom-right)
  const bk=document.createElement('div');
  bk.className='door-marker';
  bk.style.cssText='right:6px;bottom:6px;flex-direction:column;align-items:flex-end;gap:2px;';
  bk.innerHTML='<span style="font-size:14px">↗</span><span>BACKYARD</span>';
  canvas.appendChild(bk);

  // DJ booth decoration (bottom center)
  const dj=document.createElement('div');
  dj.style.cssText='position:absolute;left:152px;bottom:8px;width:42px;height:42px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;pointer-events:none;';
  dj.textContent='🎧';
  canvas.appendChild(dj);

  // Move hint grid in edit mode
  if(mode==='edit'&&selected){
    const g=document.createElement('div');
    g.style.cssText=`position:absolute;inset:0;background-image:radial-gradient(circle,rgba(6,200,232,0.15) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;border-radius:12px;`;
    canvas.appendChild(g);
  }

  // Tables
  tables.forEach(t=>{
    const el=document.createElement('div');
    const sz=t.size||70;
    const fs=sz>70?16:13;
    el.className='tbl '+(t.shape||'round')+(selected===t?' selected':'');
    el.style.cssText=`left:${t.x}px;top:${t.y}px;width:${sz}px;height:${sz}px;background:${t.color};`;
    el.innerHTML=`<span class="tbl-num" style="font-size:${fs}px">${t.name}</span>${t.sub?`<span class="tbl-sub" style="font-size:${sz>70?9:7}px">${t.sub}</span>`:''}`;
    el.addEventListener('click',e=>{e.stopPropagation();onTableClick(t);});
    canvas.appendChild(el);
  });
}

// Tap on canvas background in edit mode → move selected table
document.getElementById('canvas').addEventListener('click',function(e){
  if(mode!=='edit'||!selected)return;
  const r=this.getBoundingClientRect();
  const px=(e.clientX-r.left)/canvasScale;
  const py=(e.clientY-r.top)/canvasScale;
  // Snap to 40px grid
  const sx=Math.round((px-selected.size/2)/40)*40;
  const sy=Math.round((py-selected.size/2)/40)*40;
  selected.x=Math.max(0,Math.min(CW-selected.size,sx));
  selected.y=Math.max(0,Math.min(CH-selected.size,sy));
  saveTables();
  selected=null;
  document.getElementById('hint').textContent='Toca una mesa para editarla';
  render();
});

function onTableClick(t){
  if(mode==='view'){openInfo(t);return;}
  if(selected===t){openEdit(t);}
  else{selected=t;document.getElementById('hint').textContent='Toca una celda del canvas para moverla, o tócala de nuevo para editar';render();}
}

function setMode(m){
  if(m==='edit'&&!isAdmin)return;
  mode=m;selected=null;
  document.getElementById('btn-view').className='mbtn'+(m==='view'?' active':'');
  document.getElementById('btn-edit').className='mbtn'+(m==='edit'?' active-edit':'');
  document.getElementById('hint').textContent=m==='view'?'Toca una mesa':'Toca una mesa para editarla';
  document.getElementById('add-btn').className=m==='edit'?'show':'';
  render();
}

// INFO SHEET
function openInfo(t){
  document.getElementById('info-name').textContent=t.name;
  document.getElementById('info-sub').textContent=t.sub||'';
  const el=document.getElementById('info-guests');
  el.textContent='Cargando...';
  const today=new Date().toISOString().slice(0,10);
  db.ref('events/'+today).once('value',snap=>{
    const all=snap.val()||{};const guests=[];
    Object.values(all).forEach(cat=>{(Array.isArray(cat)?cat:Object.values(cat)).forEach(g=>{
      if(g&&g.table&&String(g.table).toLowerCase()===String(t.name).toLowerCase())
        guests.push((g.checkedIn?'✓ ':'○ ')+g.name);
    });});
    el.textContent=guests.length?guests.join('\n'):'Sin invitados asignados';
  });
  document.getElementById('info-overlay').classList.add('open');
  document.getElementById('info-sheet').classList.add('open');
}
function closeInfo(){document.getElementById('info-overlay').classList.remove('open');document.getElementById('info-sheet').classList.remove('open');}

// EDIT SHEET
function buildEditColors(){
  const row=document.getElementById('es-colors');row.innerHTML='';
  PALETTE.forEach(hex=>{
    const c=document.createElement('div');c.className='cc';c.style.background=hex;c.dataset.color=hex;
    c.addEventListener('click',()=>{if(!selected)return;selected.color=hex;syncCC(hex);saveTables();render();});
    row.appendChild(c);
  });
}
function syncCC(color){document.querySelectorAll('.cc').forEach(c=>c.classList.toggle('on',c.dataset.color===color));}
function setShape(s){if(!selected)return;selected.shape=s;document.getElementById('sopt-round').className='sopt'+(s==='round'?' on':'');document.getElementById('sopt-square').className='sopt'+(s==='square'?' on':'');saveTables();render();}
function changeSize(d){if(!selected)return;selected.size=Math.max(50,Math.min(130,(selected.size||70)+d));document.getElementById('sz-val').textContent=selected.size+'px';saveTables();render();}
function openEdit(t){
  selected=t;
  document.getElementById('es-name').value=t.name;
  document.getElementById('es-sub').value=t.sub||'';
  document.getElementById('sz-val').textContent=(t.size||70)+'px';
  syncCC(t.color);
  document.getElementById('sopt-round').className='sopt'+(t.shape!=='square'?' on':'');
  document.getElementById('sopt-square').className='sopt'+(t.shape==='square'?' on':'');
  document.getElementById('edit-overlay').classList.add('open');
  document.getElementById('edit-sheet').classList.add('open');
  setTimeout(()=>document.getElementById('es-name').select(),250);
}
function closeEdit(){
  if(selected){selected.name=document.getElementById('es-name').value||selected.name;selected.sub=document.getElementById('es-sub').value;saveTables();}
  document.getElementById('edit-overlay').classList.remove('open');
  document.getElementById('edit-sheet').classList.remove('open');
  selected=null;render();
}
document.getElementById('edit-overlay').addEventListener('click',closeEdit);
function deleteSel(){
  if(!selected)return;
  if(!confirm('¿Eliminar "'+selected.name+'"?'))return;
  tables=tables.filter(t=>t!==selected);selected=null;saveTables();render();
  document.getElementById('edit-overlay').classList.remove('open');
  document.getElementById('edit-sheet').classList.remove('open');
}

// ADD TABLE
function addTable(){
  const t={id:nextId++,name:String(tables.length+1),sub:'',x:Math.round(Math.random()*600+80),y:Math.round(Math.random()*400+60),color:'#b44fff',shape:'round',size:70};
  tables.push(t);saveTables();render();openEdit(t);toast('Mesa añadida ✓');
}

function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200);}

checkAuth();
</script>
