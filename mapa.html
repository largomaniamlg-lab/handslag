<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Håndslag — Mapa</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#06061a;--surface:#0e0c24;--surface2:#14122e;
  --accent:#b44fff;--cyan:#06c8e8;--border:rgba(255,255,255,0.1);
  --text:#f0f0f0;--muted:#888;
  --font:'Barlow Condensed',sans-serif;--mono:'Space Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;}
#lock{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.lock-logo{font-size:28px;font-weight:700;background:linear-gradient(135deg,#b44fff,#06c8e8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
#app{display:none;flex-direction:column;height:100vh;}
#hdr{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);height:50px;flex-shrink:0;}
.logo{font-size:18px;font-weight:700;background:linear-gradient(135deg,#b44fff,#06c8e8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.spacer{flex:1;}
#sync-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);}
#sync-dot.off{background:var(--muted);}
.hbtn{background:none;border:none;color:var(--muted);font-family:var(--mono);font-size:10px;cursor:pointer;padding:4px 8px;}
#modebar{display:flex;padding:8px 12px;gap:8px;background:var(--surface2);border-bottom:1px solid var(--border);align-items:center;flex-shrink:0;}
.mbtn{flex:1;padding:10px;border:1px solid var(--border);border-radius:10px;background:var(--surface);color:var(--muted);font-family:var(--mono);font-size:11px;cursor:pointer;text-align:center;touch-action:manipulation;}
.mbtn.active{background:rgba(180,79,255,0.2);border-color:var(--accent);color:var(--accent);font-weight:700;}
.mbtn.active-edit{background:rgba(6,200,232,0.15);border-color:var(--cyan);color:var(--cyan);font-weight:700;}
#hint{font-family:var(--mono);font-size:9px;color:var(--muted);text-align:center;flex:2;}
#wrap{flex:1;overflow:auto;background:var(--bg);padding:0;display:flex;flex-direction:column;}
#fp-box{width:100%;background:#fff;flex-shrink:0;}
#fp{display:block;width:100%;height:auto;font-family:'Space Mono',monospace;}
/* SVG table styles */
.tbl-g{cursor:pointer;-webkit-tap-highlight-color:transparent;}
.tbl-g .tbl-shape{transition:filter 0.15s;}
.tbl-g.selected .tbl-shape{filter:drop-shadow(0 0 8px rgba(180,79,255,0.9));stroke:#b44fff !important;stroke-width:5 !important;}
/* Info sheet */
#info-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:300;}
#info-overlay.open{display:block;}
#info-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:2px solid var(--accent);border-radius:20px 20px 0 0;padding:20px 20px 40px;z-index:301;transform:translateY(100%);transition:transform 0.3s;}
#info-sheet.open{transform:translateY(0);}
.sh-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px;}
.sh-name{font-size:46px;font-weight:700;color:var(--accent);font-family:var(--font);line-height:1;}
.sh-sub{font-family:var(--mono);font-size:11px;color:var(--muted);margin:4px 0 14px;}
.sh-close{position:absolute;top:20px;right:20px;background:var(--surface2);border:none;color:var(--muted);width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;}
/* Edit sheet */
#edit-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:400;}
#edit-overlay.open{display:block;}
#edit-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:2px solid var(--cyan);border-radius:20px 20px 0 0;padding:20px 20px 40px;z-index:401;transform:translateY(100%);transition:transform 0.3s;max-height:80vh;overflow-y:auto;}
#edit-sheet.open{transform:translateY(0);}
.es-lbl{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin:14px 0 6px;display:block;}
.es-inp{width:100%;background:var(--surface2);border:2px solid var(--border);border-radius:12px;color:var(--text);font-family:var(--mono);font-size:22px;padding:14px;outline:none;}
.es-inp:focus{border-color:var(--cyan);}
.btn-done{width:100%;padding:16px;background:linear-gradient(135deg,#b44fff,#06c8e8);border:none;border-radius:12px;color:#000;font-family:var(--mono);font-size:13px;font-weight:700;cursor:pointer;margin-top:18px;}
.btn-del{width:100%;padding:13px;background:transparent;border:2px solid rgba(224,82,82,0.4);border-radius:12px;color:#e05252;font-family:var(--mono);font-size:12px;cursor:pointer;margin-top:8px;}
#add-btn{position:fixed;bottom:24px;right:18px;width:58px;height:58px;background:linear-gradient(135deg,#b44fff,#06c8e8);border:none;border-radius:50%;color:#000;font-size:28px;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(180,79,255,0.4);z-index:100;}
#add-btn.show{display:flex;}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--accent);color:#000;font-family:var(--mono);font-size:11px;font-weight:700;padding:10px 20px;border-radius:20px;transition:transform 0.3s;z-index:600;pointer-events:none;}
#toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="lock">
  <div style="font-size:40px">🔐</div>
  <div class="lock-logo">HÅNDSLAG</div>
  <div style="font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center;line-height:1.8" id="lock-msg">Verificando acceso...</div>
  <button style="display:none;font-family:var(--mono);font-size:11px;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:8px;cursor:pointer" id="lock-back" onclick="goBack()">← Volver</button>
</div>
<div id="app">
  <div id="hdr">
    <button class="hbtn" onclick="goBack()">← Volver</button>
    <span class="logo">Håndslag</span>
    <div class="spacer"></div>
    <div id="sync-dot"></div>
  </div>
  <div id="modebar">
    <span id="hint" style="flex:1;text-align:center">Toca una mesa</span>
  </div>
  <div id="wrap">
    <div id="fp-box">
      <svg id="fp" viewBox="0 0 760 1080" width="100%">
        <!-- ── ROOM ── -->
        <rect x="40" y="100" width="680" height="920" fill="#faf7f1"/>
        <!-- ── ZONES ── -->
        <rect x="560" y="105" width="155" height="910" fill="#e8ede6"/>
        <rect x="50" y="830" width="264" height="178" rx="6" fill="#f3e7d8"/>
        <!-- zone divider -->
        <line x1="560" y1="175" x2="560" y2="1018" stroke="#b8b1a2" stroke-width="3"/>
        <!-- ── WALLS ── -->
        <g stroke="#33312c" stroke-width="7" stroke-linecap="round" fill="none">
          <line x1="40" y1="100" x2="720" y2="100"/>
          <line x1="40" y1="100" x2="40" y2="1020"/>
          <line x1="720" y1="100" x2="720" y2="1020"/>
          <line x1="40" y1="1020" x2="720" y2="1020"/>
        </g>
        <!-- ── TOP KAFFE SHELF ── -->
        <rect x="290" y="112" width="264" height="38" rx="5" fill="#33312c"/>
        <text x="422" y="86" text-anchor="middle" font-size="22" letter-spacing="6" fill="#6f695d">KAFFE</text>
        <!-- ── MAIN BAR ── -->
        <rect x="290" y="272" width="76" height="312" rx="6" fill="#33312c"/>
        <text transform="rotate(-90 328 428)" x="328" y="428" text-anchor="middle" dominant-baseline="middle" font-size="21" letter-spacing="5" fill="#f3efe6">MAIN BAR</text>
        <!-- ── BACK BAR ── -->
        <rect x="384" y="436" width="86" height="150" rx="6" fill="#33312c"/>
        <text transform="rotate(-90 427 511)" x="427" y="511" text-anchor="middle" dominant-baseline="middle" font-size="18" letter-spacing="4" fill="#f3efe6">BACK BAR</text>
        <!-- ── DANCEFLOOR LABEL ── -->
        <text x="182" y="845" text-anchor="middle" font-size="14" letter-spacing="4" fill="#b08a55">DANCEFLOOR</text>
        <!-- ── TABLES (rendered by JS) ── -->
        <g id="tables-layer"></g>
      </svg>
    </div>
  </div>
</div>

<!-- Info sheet -->
<div id="info-overlay" onclick="closeInfo()"></div>
<div id="info-sheet">
  <button class="sh-close" onclick="closeInfo()">✕</button>
  <div class="sh-handle"></div>
  <div class="sh-name" id="info-name"></div>
  <div class="sh-sub" id="info-sub"></div>
  <div id="info-time" style="font-family:var(--mono);font-size:13px;color:var(--cyan);margin:6px 0 4px;display:none"></div>
  <div id="info-count" style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:14px"></div>
  <div id="info-guests"></div>
</div>

<div id="toast"></div>

<script>
const FB_CFG={apiKey:"AIzaSyC4c-4MXb9lrVMiHWn_0tE6PKIOU_lScRs",authDomain:"handslag-fdd42.firebaseapp.com",databaseURL:"https://handslag-fdd42-default-rtdb.europe-west1.firebasedatabase.app",projectId:"handslag-fdd42",storageBucket:"handslag-fdd42.appspot.com",messagingSenderId:"1090291987706",appId:"1:1090291987706:web:0effe68dc7e7faa1ef06cd"};
firebase.initializeApp(FB_CFG);
const db=firebase.database();

// Default tables from the official SVG floor plan
const DEFAULT_TABLES=[
  {id:3,name:'3',sub:'',type:'rect',x:318,y:190,w:64,h:64},
  {id:2,name:'2',sub:'',type:'rect',x:396,y:190,w:64,h:64},
  {id:1,name:'1',sub:'',type:'rect',x:474,y:190,w:64,h:64},
  {id:4,name:'4',sub:'',type:'rect',x:56,y:282,w:64,h:64},
  {id:5,name:'5',sub:'',type:'rect',x:56,y:360,w:64,h:64},
  {id:6,name:'6',sub:'',type:'rect',x:56,y:438,w:64,h:64},
  {id:7,name:'7',sub:'',type:'rect',x:56,y:526,w:64,h:64},
  {id:8,name:'8',sub:'',type:'rect',x:56,y:604,w:64,h:64},
  {id:9,name:'9',sub:'Dancefloor',type:'rect',x:60,y:852,w:64,h:64},
  {id:10,name:'10',sub:'',type:'rect',x:196,y:852,w:64,h:64},
  {id:11,name:'11',sub:'',type:'circle',cx:302,cy:950,r:30},
  {id:12,name:'12',sub:'',type:'circle',cx:374,cy:950,r:30},
  {id:13,name:'13',sub:'',type:'circle',cx:446,cy:950,r:30},
  {id:14,name:'14',sub:'',type:'circle',cx:518,cy:950,r:30},
  {id:15,name:'15',sub:'',type:'circle',cx:604,cy:950,r:30},
  {id:16,name:'16',sub:'',type:'circle',cx:636,cy:248,r:30},
  {id:17,name:'17',sub:'',type:'circle',cx:636,cy:368,r:30},
  {id:18,name:'18',sub:'',type:'circle',cx:636,cy:488,r:30},
  {id:19,name:'19',sub:'',type:'circle',cx:636,cy:608,r:30},
];

let tables=[],tableStats={},nextId=200;

function checkAuth(){
  var user=null;
  try{user=JSON.parse(sessionStorage.getItem('hs_currentUser'));}catch(e){}
  if(!user){try{user=JSON.parse(localStorage.getItem('hs_currentUser'));}catch(e){}}
  if(!user){
    var uname=sessionStorage.getItem('hs_loggedUsername')||localStorage.getItem('hs_loggedUsername');
    if(uname){db.ref('users').once('value',function(s){var all=s.val()||{};var f=Object.values(all).find(function(u){return u.username===uname;});if(f)grantAccess(f);else denyAccess();});return;}
    denyAccess();return;
  }
  grantAccess(user);
}
function grantAccess(user){
  document.getElementById('lock').style.display='none';
  document.getElementById('app').style.display='flex';
  tables=DEFAULT_TABLES.map(function(t){return Object.assign({},t);});
  render();
  loadTableStats();
  db.ref('.info/connected').on('value',function(s){document.getElementById('sync-dot').className=s.val()?'':'off';});
  db.ref('mapa_v2/main/tables').on('value',function(snap){
    var raw=snap.val();
    var LAYOUT_VERSION=2;
    if(raw&&raw.__v===LAYOUT_VERSION){
      var arr=Array.isArray(raw)?raw:Object.values(raw);
      arr=arr.filter(function(x){return x&&x!==null&&typeof x==='object'&&!('__v' in x);});
      if(arr.length>0){
        tables=arr;
        nextId=Math.max(nextId,...tables.map(function(t){return t.id||0;}))+1;
      } else {
        tables=DEFAULT_TABLES.map(function(t){return Object.assign({},t);});
        saveTables();
      }
    } else {
      tables=DEFAULT_TABLES.map(function(t){return Object.assign({},t);});
      saveTables();
    }
    render();
  });
}
function denyAccess(){
  document.getElementById('lock-msg').innerHTML='Sin sesión activa.<br>Abre desde la app Håndslag.';
  document.getElementById('lock-back').style.display='block';
}
function goBack(){window.location.href='index.html';}


function saveTables(){
  var data=tables.map(function(t){return Object.assign({},t);});
  data.__v=2;
  db.ref('mapa_v2/main/tables').set(data);
}

function loadTableStats(){
  var today=new Date().toISOString().slice(0,10);
  db.ref('events/'+today).on('value',function(snap){
    var all=snap.val()||{};
    var stats={};
    Object.values(all).forEach(function(cat){
      var list=Array.isArray(cat)?cat:Object.values(cat);
      list.forEach(function(g){
        if(g&&g.table){
          var k=String(g.table).toLowerCase();
          if(!stats[k])stats[k]={count:0};
          stats[k].count++;
        }
      });
    });
    tableStats=stats;
    render();
  });
}

var NS='http://www.w3.org/2000/svg';
function svgEl(tag,attrs){
  var el=document.createElementNS(NS,tag);
  Object.keys(attrs).forEach(function(k){el.setAttribute(k,attrs[k]);});
  return el;
}

function render(){
  var layer=document.getElementById('tables-layer');
  while(layer.firstChild)layer.removeChild(layer.firstChild);
  tables.forEach(function(t){
    var g=document.createElementNS(NS,'g');
    g.setAttribute('class','tbl-g');
    g.setAttribute('data-id',t.id);

    var stat=tableStats[String(t.name).toLowerCase()];
    var occupied=!!stat;
    var fillColor=occupied?'#e8a838':'#fff';
    var strokeColor=occupied?'#c07010':'#33312c';
    var numColor=occupied?'#fff':'#33312c';

    var shape,tx,ty;
    if(t.type==='circle'){
      var r=t.r||37;
      shape=svgEl('circle',{cx:t.cx,cy:t.cy,r:r,fill:fillColor,stroke:strokeColor,'stroke-width':'3',class:'tbl-shape'});
      tx=t.cx; ty=t.cy+(occupied&&stat.count?0:9);
    } else {
      var w=t.w||72,h=t.h||72;
      shape=svgEl('rect',{x:t.x,y:t.y,width:w,height:h,rx:'7',fill:fillColor,stroke:strokeColor,'stroke-width':'3',class:'tbl-shape'});
      tx=t.x+w/2; ty=t.y+h/2+(occupied&&stat.count?0:10);
    }
    g.appendChild(shape);

    // Number label
    var txt=svgEl('text',{x:tx,y:ty,'text-anchor':'middle','font-size':t.name.length>2?'22':'28','font-weight':'700',fill:numColor,'pointer-events':'none'});
    txt.textContent=t.name;
    g.appendChild(txt);

    // Guest count
    if(occupied&&stat.count){
      var cnt=svgEl('text',{x:tx,y:ty+18,'text-anchor':'middle','font-size':'14',fill:'#fff4d6','pointer-events':'none'});
      cnt.textContent=stat.count+'p';
      g.appendChild(cnt);
    }

    // Sub label
    if(t.sub&&!occupied){
      var sub=svgEl('text',{x:tx,y:ty+22,'text-anchor':'middle','font-size':'14',fill:'#888','pointer-events':'none'});
      sub.textContent=t.sub;
      g.appendChild(sub);
    }

    g.addEventListener('click',function(e){e.stopPropagation();openInfo(t);});
    layer.appendChild(g);
  });
}


function openInfo(t){
  document.getElementById('info-name').textContent=t.name;
  document.getElementById('info-sub').textContent=t.sub||'';
  var timeEl=document.getElementById('info-time');
  if(t.timeFrom||t.timeTo){timeEl.textContent='🕐 '+(t.timeFrom||'?')+' – '+(t.timeTo||'?');timeEl.style.display='block';}
  else{timeEl.style.display='none';}
  var stat=tableStats[String(t.name).toLowerCase()];
  document.getElementById('info-count').textContent=stat?stat.count+' persona'+(stat.count!==1?'s':'')+' asignadas':'';
  var el=document.getElementById('info-guests');
  el.innerHTML='<span style="font-family:var(--mono);font-size:11px;color:var(--muted)">Cargando...</span>';
  var today=new Date().toISOString().slice(0,10);
  db.ref('events/'+today).once('value',function(snap){
    var all=snap.val()||{};var guests=[];
    Object.values(all).forEach(function(cat){
      var list=Array.isArray(cat)?cat:Object.values(cat);
      list.forEach(function(g){
        if(g&&g.table&&String(g.table).toLowerCase()===String(t.name).toLowerCase())
          guests.push(g);
      });
    });
    if(!guests.length){el.innerHTML='<span style="font-family:var(--mono);font-size:12px;color:var(--muted)">Sin invitados asignados</span>';return;}
    el.innerHTML=guests.map(function(g){
      var lines=[];
      lines.push('<div style="border-bottom:1px solid rgba(255,255,255,0.06);padding:10px 0;">');
      lines.push('<div style="font-family:var(--font);font-size:18px;font-weight:700;color:'+(g.checkedIn?'var(--accent)':'var(--text)')+';">'+(g.checkedIn?'✓ ':'○ ')+g.name+'</div>');
      if(g.checkedIn&&g.checkedAt) lines.push('<div style="font-family:var(--mono);font-size:11px;color:var(--cyan);margin-top:3px">Entrada: '+g.checkedAt+'</div>');
      if(g.notes) lines.push('<div style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:4px;white-space:pre-wrap">'+g.notes+'</div>');
      lines.push('</div>');
      return lines.join('');
    }).join('');
  });
  document.getElementById('info-overlay').classList.add('open');
  document.getElementById('info-sheet').classList.add('open');
}
function closeInfo(){
  document.getElementById('info-overlay').classList.remove('open');
  document.getElementById('info-sheet').classList.remove('open');
}

function toast(msg){var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(function(){el.classList.remove('show');},2200);}

checkAuth();
</script>
</body>
</html>
